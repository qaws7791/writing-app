<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>에세이 작성 페이지</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Noto Sans KR", sans-serif;
        background-color: #fafafa;
      }
      /* 스크롤바 디자인 최소화 */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #e5e7eb;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #d1d5db;
      }

      /* 모바일 환경에서 에디터 최소 높이 확보 */
      .editor-min-h {
        min-height: 60vh;
      }
      @media (min-width: 768px) {
        .editor-min-h {
          min-height: auto;
        }
      }
    </style>
  </head>
  <body
    class="flex h-screen w-full flex-col overflow-hidden text-slate-800 antialiased md:flex-row"
  >
    <nav
      class="fixed bottom-0 left-0 z-50 flex w-full items-center justify-around border-t border-gray-200 bg-[#fafafa] py-3 md:relative md:h-screen md:w-20 md:flex-col md:justify-start md:gap-10 md:border-t-0 md:border-r md:py-10"
    >
      <a
        href="#"
        class="p-2 text-slate-600 transition-colors hover:text-slate-900"
        ><i class="ri-home-5-line text-[26px] font-light"></i
      ></a>
      <a
        href="#"
        class="p-2 text-slate-600 transition-colors hover:text-slate-900"
        ><i class="ri-graduation-cap-line text-[26px] font-light"></i
      ></a>
      <a
        href="#"
        class="p-2 text-slate-600 transition-colors hover:text-slate-900"
        ><i class="ri-edit-box-line text-[26px] font-light"></i
      ></a>
      <a
        href="#"
        class="p-2 text-slate-600 transition-colors hover:text-slate-900"
        ><i class="ri-inbox-line text-[26px] font-light"></i
      ></a>
    </nav>

    <div
      class="flex h-full flex-1 flex-col overflow-y-auto pb-[64px] md:flex-row md:overflow-hidden md:pb-0"
    >
      <main class="flex flex-1 flex-col px-6 md:overflow-y-auto md:px-20">
        <header
          class="mx-auto mt-2 flex w-full max-w-4xl items-center justify-between py-6 md:mt-4"
        >
          <div
            class="flex items-center gap-2 text-sm font-medium text-slate-500"
          >
            <i id="saveIcon" class="ri-check-line text-lg text-slate-600"></i>
            <span id="saveText">저장됨</span>
          </div>

          <div class="relative">
            <button
              id="settingsBtn"
              class="rounded-full p-2 text-slate-500 transition-all hover:bg-slate-100 hover:text-slate-800 focus:outline-none"
            >
              <i class="ri-settings-3-line text-xl"></i>
            </button>
            <div
              id="settingsMenu"
              class="absolute right-0 z-10 mt-2 hidden w-44 rounded-xl border border-gray-100 bg-white py-2 shadow-md"
            >
              <button
                class="flex w-full items-center gap-3 px-4 py-2.5 text-left text-sm text-slate-700 transition-colors hover:bg-slate-50"
              >
                <i class="ri-share-forward-line text-lg text-slate-500"></i>
                공유
              </button>
              <button
                class="flex w-full items-center gap-3 px-4 py-2.5 text-left text-sm text-slate-700 transition-colors hover:bg-slate-50"
              >
                <i class="ri-download-line text-lg text-slate-500"></i> 내보내기
              </button>
              <div class="my-1 border-t border-gray-100"></div>
              <button
                class="flex w-full items-center gap-3 px-4 py-2.5 text-left text-sm text-red-600 transition-colors hover:bg-red-50"
              >
                <i class="ri-delete-bin-line text-lg text-red-500"></i> 삭제
              </button>
            </div>
          </div>
        </header>

        <div
          class="editor-min-h mx-auto mt-4 flex w-full max-w-4xl flex-1 flex-col md:mt-10"
        >
          <input
            type="text"
            placeholder="어떤 이야기를 남길까요?"
            class="mb-8 w-full bg-transparent text-3xl font-light tracking-tight text-slate-800 placeholder-slate-400 outline-none md:text-[40px]"
          />
          <textarea
            id="editorBody"
            placeholder="생각이 흐르는 대로 자유롭게 적어보세요..."
            class="w-full flex-1 resize-none bg-transparent text-lg leading-relaxed font-light tracking-tight text-slate-700 placeholder-slate-400 outline-none md:text-[22px]"
          ></textarea>
        </div>
      </main>

      <aside
        class="flex w-full shrink-0 flex-col border-t border-gray-200 bg-white pb-10 md:h-screen md:w-[340px] md:overflow-y-auto md:border-t-0 md:border-l md:bg-[#fafafa] md:pb-0"
      >
        <div class="p-6 md:p-8">
          <h2
            class="mb-6 flex items-center gap-2 text-base font-medium text-slate-800"
          >
            <i class="ri-sparkling-fill text-[#4a6b8c]"></i> AI 글쓰기 도우미
          </h2>

          <div class="flex flex-col gap-3">
            <button
              class="group flex cursor-pointer items-start justify-between rounded-2xl border border-gray-200 bg-white p-4 text-left transition-all hover:border-[#4a6b8c] hover:shadow-sm"
            >
              <div>
                <span
                  class="block text-sm font-medium text-slate-700 transition-colors group-hover:text-[#4a6b8c]"
                  >맞춤법 검사</span
                >
                <span
                  class="mt-1.5 block text-[13px] leading-snug text-slate-400"
                  >오탈자와 띄어쓰기를<br />정확하게 교정합니다</span
                >
              </div>
              <i
                class="ri-spellcheck text-[22px] text-slate-300 transition-colors group-hover:text-[#4a6b8c]"
              ></i>
            </button>

            <button
              class="group flex cursor-pointer items-start justify-between rounded-2xl border border-gray-200 bg-white p-4 text-left transition-all hover:border-[#4a6b8c] hover:shadow-sm"
            >
              <div>
                <span
                  class="block text-sm font-medium text-slate-700 transition-colors group-hover:text-[#4a6b8c]"
                  >문장 개선하기</span
                >
                <span
                  class="mt-1.5 block text-[13px] leading-snug text-slate-400"
                  >더 자연스럽고 매끄러운<br />문장으로 다듬습니다</span
                >
              </div>
              <i
                class="ri-magic-line text-[22px] text-slate-300 transition-colors group-hover:text-[#4a6b8c]"
              ></i>
            </button>

            <button
              class="group flex cursor-pointer items-start justify-between rounded-2xl border border-gray-200 bg-white p-4 text-left transition-all hover:border-[#4a6b8c] hover:shadow-sm"
            >
              <div>
                <span
                  class="block text-sm font-medium text-slate-700 transition-colors group-hover:text-[#4a6b8c]"
                  >피드백 받기</span
                >
                <span
                  class="mt-1.5 block text-[13px] leading-snug text-slate-400"
                  >글의 전반적인 구조와<br />흐름에 대한 조언을 얻습니다</span
                >
              </div>
              <i
                class="ri-feedback-line text-[22px] text-slate-300 transition-colors group-hover:text-[#4a6b8c]"
              ></i>
            </button>
          </div>
        </div>
      </aside>
    </div>

    <script>
      // 우측 상단 설정 드롭다운 메뉴 토글 로직
      const settingsBtn = document.getElementById("settingsBtn")
      const settingsMenu = document.getElementById("settingsMenu")

      settingsBtn.addEventListener("click", (e) => {
        e.stopPropagation()
        settingsMenu.classList.toggle("hidden")
      })

      // 드롭다운 외부 클릭 시 닫기
      document.addEventListener("click", (e) => {
        if (
          !settingsMenu.classList.contains("hidden") &&
          !settingsMenu.contains(e.target) &&
          e.target !== settingsBtn
        ) {
          settingsMenu.classList.add("hidden")
        }
      })

      // 구글 독스 스타일의 자동 저장 UI 시뮬레이션
      const editorBody = document.getElementById("editorBody")
      const saveText = document.getElementById("saveText")
      const saveIcon = document.getElementById("saveIcon")
      let typingTimer
      const doneTypingInterval = 1000 // 타이핑 중지 1초 후 저장됨으로 변경

      editorBody.addEventListener("input", () => {
        clearTimeout(typingTimer)

        // 입력 중: '저장중...' 상태 표시 (회전하는 아이콘)
        saveText.textContent = "저장중..."
        saveIcon.className =
          "ri-refresh-line animate-spin text-slate-400 text-lg"

        typingTimer = setTimeout(() => {
          // 입력 완료: '저장됨' 상태 표시 (체크 아이콘)
          saveText.textContent = "저장됨"
          saveIcon.className = "ri-check-line text-slate-600 text-lg"
        }, doneTypingInterval)
      })
    </script>
  </body>
</html>
