<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>수필 — 사유의 공간</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f7f4ee;
        --paper: #fdfaf5;
        --ink: #2c2a26;
        --ink-light: #6b6760;
        --ink-faint: #b8b4ae;
        --accent: #8b6f4e;
        --accent-light: #d4b896;
        --accent-faint: #f0e8dc;
        --line: #e8e3db;
        --shadow: rgba(44, 42, 38, 0.06);
        --highlight-yellow: rgba(255, 220, 100, 0.4);
        --highlight-rose: rgba(220, 140, 140, 0.3);
        --highlight-sage: rgba(140, 180, 150, 0.35);
      }
      [data-theme="night"] {
        --bg: #1a1c23;
        --paper: #21242e;
        --ink: #e8e4dc;
        --ink-light: #9a9590;
        --ink-faint: #4a4844;
        --accent: #c4956a;
        --accent-light: #8b6f4e;
        --accent-faint: #2c2820;
        --line: #2e3040;
        --shadow: rgba(0, 0, 0, 0.3);
        --highlight-yellow: rgba(200, 170, 60, 0.3);
        --highlight-rose: rgba(180, 100, 100, 0.3);
        --highlight-sage: rgba(100, 150, 110, 0.3);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
      }
      body {
        font-family: "Noto Sans KR", sans-serif;
        background: var(--bg);
        color: var(--ink);
        transition:
          background 0.5s,
          color 0.5s;
        overflow: hidden;
      }

      /* ── LAYOUT ── */
      .app {
        display: flex;
        height: 100vh;
      }

      /* ── LEFT SIDEBAR ── */
      .sidebar {
        width: 260px;
        min-width: 260px;
        background: var(--paper);
        border-right: 1px solid var(--line);
        display: flex;
        flex-direction: column;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 10;
      }
      .sidebar.collapsed {
        width: 0;
        min-width: 0;
        overflow: hidden;
      }
      .sidebar-header {
        padding: 28px 24px 20px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .logo {
        font-family: "Noto Serif KR", serif;
        font-size: 22px;
        font-weight: 600;
        color: var(--accent);
        letter-spacing: -0.5px;
      }
      .logo span {
        font-weight: 300;
        color: var(--ink-light);
        font-size: 13px;
        margin-left: 6px;
      }
      .sidebar-nav {
        flex: 1;
        overflow-y: auto;
        padding: 16px 0;
      }
      .nav-section {
        margin-bottom: 24px;
      }
      .nav-label {
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 1.5px;
        color: var(--ink-faint);
        text-transform: uppercase;
        padding: 0 24px 8px;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 24px;
        cursor: pointer;
        font-size: 14px;
        color: var(--ink-light);
        border-radius: 0;
        transition: all 0.2s;
        border-left: 2px solid transparent;
        white-space: nowrap;
      }
      .nav-item:hover {
        color: var(--ink);
        background: var(--accent-faint);
      }
      .nav-item.active {
        color: var(--accent);
        border-left-color: var(--accent);
        background: var(--accent-faint);
        font-weight: 500;
      }
      .nav-item .icon {
        font-size: 15px;
        width: 18px;
        text-align: center;
      }
      .stage-badge {
        margin-left: auto;
        font-size: 10px;
        padding: 2px 7px;
        border-radius: 10px;
        font-weight: 500;
        background: var(--accent-light);
        color: var(--paper);
      }
      .sidebar-footer {
        padding: 16px 24px;
        border-top: 1px solid var(--line);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        font-size: 12px;
        color: var(--ink-light);
        padding: 6px 10px;
        border-radius: 20px;
        border: 1px solid var(--line);
        transition: all 0.2s;
        background: var(--bg);
        margin-left: auto;
      }
      .theme-toggle:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* ── MAIN EDITOR ── */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: relative;
      }
      .topbar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 28px;
        border-bottom: 1px solid var(--line);
        background: var(--paper);
        transition: opacity 0.3s;
      }
      .topbar-left {
        display: flex;
        align-items: center;
        gap: 10px;
        flex: 1;
      }
      .sidebar-toggle {
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border-radius: 6px;
        color: var(--ink-light);
        font-size: 16px;
        transition: all 0.2s;
      }
      .sidebar-toggle:hover {
        background: var(--accent-faint);
        color: var(--accent);
      }
      .doc-title-input {
        font-family: "Noto Serif KR", serif;
        font-size: 16px;
        font-weight: 500;
        background: none;
        border: none;
        outline: none;
        color: var(--ink);
        flex: 1;
        min-width: 0;
      }
      .doc-title-input::placeholder {
        color: var(--ink-faint);
      }
      .topbar-right {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .stage-selector {
        display: flex;
        gap: 4px;
        background: var(--bg);
        border-radius: 20px;
        padding: 3px;
        border: 1px solid var(--line);
      }
      .stage-btn {
        font-size: 11px;
        padding: 4px 11px;
        border-radius: 16px;
        cursor: pointer;
        color: var(--ink-light);
        transition: all 0.2s;
        white-space: nowrap;
        font-family: "Noto Sans KR";
        border: none;
        background: none;
      }
      .stage-btn.active {
        background: var(--accent);
        color: white;
        font-weight: 500;
      }
      .icon-btn {
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border-radius: 6px;
        color: var(--ink-light);
        font-size: 16px;
        transition: all 0.2s;
        border: none;
        background: none;
      }
      .icon-btn:hover {
        background: var(--accent-faint);
        color: var(--accent);
      }
      .icon-btn.active {
        color: var(--accent);
        background: var(--accent-faint);
      }

      /* ── EDITOR AREA ── */
      .editor-wrapper {
        flex: 1;
        overflow-y: auto;
        display: flex;
        justify-content: center;
        padding: 48px 24px;
        position: relative;
      }
      .editor-container {
        width: 100%;
        max-width: 680px;
        display: flex;
        gap: 0;
        position: relative;
      }
      .editor-content {
        flex: 1;
        min-width: 0;
      }
      .editor-area {
        width: 100%;
        min-height: 60vh;
        font-family: "Noto Serif KR", serif;
        font-size: 19px;
        line-height: 2;
        color: var(--ink);
        background: none;
        border: none;
        outline: none;
        resize: none;
        letter-spacing: 0.02em;
        word-break: keep-all;
      }
      .editor-area::placeholder {
        color: var(--ink-faint);
        font-style: italic;
      }

      /* side notes */
      .sidenotes-col {
        width: 200px;
        min-width: 200px;
        margin-left: 32px;
        padding-top: 4px;
      }
      .sidenote {
        background: var(--accent-faint);
        border-left: 2px solid var(--accent-light);
        border-radius: 0 6px 6px 0;
        padding: 10px 12px;
        margin-bottom: 12px;
        font-size: 13px;
        line-height: 1.6;
        color: var(--ink-light);
        font-family: "Noto Sans KR";
        cursor: pointer;
        transition: all 0.2s;
        position: relative;
      }
      .sidenote:hover {
        border-left-color: var(--accent);
        color: var(--ink);
      }
      .sidenote-time {
        font-size: 10px;
        color: var(--ink-faint);
        margin-bottom: 4px;
        display: block;
      }
      .add-sidenote {
        border: 1.5px dashed var(--line);
        border-radius: 6px;
        padding: 8px 12px;
        font-size: 12px;
        color: var(--ink-faint);
        cursor: pointer;
        text-align: center;
        transition: all 0.2s;
        font-family: "Noto Sans KR";
      }
      .add-sidenote:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* word count bar */
      .statusbar {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 10px 28px;
        border-top: 1px solid var(--line);
        background: var(--paper);
        font-size: 12px;
        color: var(--ink-faint);
        transition: opacity 0.3s;
      }
      .statusbar span {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .breath-meter {
        display: flex;
        gap: 3px;
        align-items: center;
      }
      .breath-bar {
        width: 3px;
        border-radius: 2px;
        background: var(--accent-light);
        transition: height 0.3s;
      }
      .saved-indicator {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 5px;
        opacity: 0;
        transition: opacity 1s;
      }
      .saved-indicator.show {
        opacity: 1;
      }

      /* ── RIGHT PANEL ── */
      .right-panel {
        width: 320px;
        min-width: 320px;
        background: var(--paper);
        border-left: 1px solid var(--line);
        display: flex;
        flex-direction: column;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        overflow: hidden;
      }
      .right-panel.hidden {
        width: 0;
        min-width: 0;
      }
      .panel-header {
        padding: 20px 20px 16px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .panel-title {
        font-size: 13px;
        font-weight: 500;
        color: var(--ink);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .panel-tabs {
        display: flex;
        gap: 0;
        border-bottom: 1px solid var(--line);
      }
      .panel-tab {
        flex: 1;
        padding: 12px;
        text-align: center;
        font-size: 12px;
        cursor: pointer;
        color: var(--ink-light);
        border-bottom: 2px solid transparent;
        transition: all 0.2s;
        font-family: "Noto Sans KR";
      }
      .panel-tab.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
        font-weight: 500;
      }
      .panel-body {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
      }

      /* Fragment cards */
      .fragment-card {
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 14px;
        margin-bottom: 12px;
        cursor: pointer;
        transition: all 0.2s;
        font-family: "Noto Serif KR";
      }
      .fragment-card:hover {
        border-color: var(--accent-light);
        box-shadow: 0 2px 12px var(--shadow);
        transform: translateY(-1px);
      }
      .fragment-text {
        font-size: 14px;
        line-height: 1.7;
        color: var(--ink);
        margin-bottom: 8px;
      }
      .fragment-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 11px;
        color: var(--ink-faint);
        font-family: "Noto Sans KR";
      }
      .fragment-stage {
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 8px;
        font-weight: 500;
      }
      .fragment-stage.seed {
        background: #fff3dc;
        color: #9b7a30;
      }
      .fragment-stage.root {
        background: #e8f4ee;
        color: #3d7a52;
      }
      .fragment-stage.bloom {
        background: #f0e8f8;
        color: #7a4a9b;
      }
      .add-fragment-btn {
        width: 100%;
        padding: 12px;
        border: 1.5px dashed var(--line);
        border-radius: 10px;
        background: none;
        font-size: 13px;
        color: var(--ink-faint);
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
        font-family: "Noto Sans KR";
        margin-bottom: 12px;
      }
      .add-fragment-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* AI Panel */
      .ai-question {
        background: var(--accent-faint);
        border: 1px solid var(--accent-light);
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 12px;
        position: relative;
        overflow: hidden;
      }
      .ai-question::before {
        content: '"';
        position: absolute;
        top: -4px;
        left: 10px;
        font-size: 60px;
        color: var(--accent-light);
        font-family: "Noto Serif KR";
        opacity: 0.4;
        line-height: 1;
      }
      .ai-q-text {
        font-size: 14px;
        line-height: 1.8;
        color: var(--ink);
        font-family: "Noto Serif KR";
        padding-top: 8px;
      }
      .ai-q-meta {
        font-size: 11px;
        color: var(--accent);
        margin-top: 8px;
        font-family: "Noto Sans KR";
      }
      .ai-answer-input {
        width: 100%;
        min-height: 80px;
        resize: none;
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        margin-top: 8px;
        font-family: "Noto Serif KR";
        font-size: 13px;
        color: var(--ink);
        outline: none;
        line-height: 1.7;
        transition: border-color 0.2s;
      }
      .ai-answer-input:focus {
        border-color: var(--accent);
      }
      .ai-btn {
        padding: 8px 14px;
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
        margin-top: 8px;
        font-family: "Noto Sans KR";
        font-weight: 500;
        transition: all 0.2s;
        border: none;
      }
      .ai-btn-primary {
        background: var(--accent);
        color: white;
      }
      .ai-btn-primary:hover {
        opacity: 0.85;
      }
      .ai-btn-secondary {
        background: var(--bg);
        color: var(--ink-light);
        border: 1px solid var(--line);
        margin-left: 6px;
      }
      .ai-btn-secondary:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* Highlight reactions in read mode */
      .highlight-yellow {
        background: var(--highlight-yellow);
        border-radius: 2px;
      }
      .highlight-rose {
        background: var(--highlight-rose);
        border-radius: 2px;
      }
      .highlight-sage {
        background: var(--highlight-sage);
        border-radius: 2px;
      }

      /* Read mode */
      .read-view {
        width: 100%;
        max-width: 640px;
        font-family: "Noto Serif KR", serif;
        font-size: 19px;
        line-height: 2;
        color: var(--ink);
        letter-spacing: 0.02em;
        word-break: keep-all;
        display: none;
      }
      .read-view.active {
        display: block;
      }
      .read-view p {
        margin-bottom: 1.5em;
      }
      .read-view .selection-toolbar {
        position: fixed;
        background: var(--ink);
        border-radius: 8px;
        padding: 6px 10px;
        display: none;
        align-items: center;
        gap: 6px;
        z-index: 100;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      }
      .sel-btn {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid rgba(255, 255, 255, 0.3);
        transition: transform 0.15s;
      }
      .sel-btn:hover {
        transform: scale(1.2);
      }

      /* Toast */
      .toast {
        position: fixed;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--ink);
        color: var(--paper);
        padding: 10px 20px;
        border-radius: 20px;
        font-size: 13px;
        font-family: "Noto Sans KR";
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
        z-index: 1000;
      }
      .toast.show {
        opacity: 1;
      }

      /* Modal for new fragment */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 200;
        backdrop-filter: blur(4px);
      }
      .modal-overlay.open {
        display: flex;
      }
      .modal {
        background: var(--paper);
        border-radius: 16px;
        padding: 28px;
        width: 420px;
        max-width: 90vw;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      }
      .modal-title {
        font-family: "Noto Serif KR";
        font-size: 18px;
        font-weight: 500;
        margin-bottom: 16px;
        color: var(--ink);
      }
      .modal textarea {
        width: 100%;
        min-height: 120px;
        resize: none;
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 14px;
        font-family: "Noto Serif KR";
        font-size: 16px;
        color: var(--ink);
        outline: none;
        line-height: 1.8;
      }
      .modal textarea:focus {
        border-color: var(--accent);
      }
      .modal-actions {
        display: flex;
        gap: 8px;
        margin-top: 14px;
        justify-content: flex-end;
      }
      .modal-btn {
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-family: "Noto Sans KR";
        font-weight: 500;
        transition: all 0.2s;
        border: none;
      }
      .modal-btn-primary {
        background: var(--accent);
        color: white;
      }
      .modal-btn-primary:hover {
        opacity: 0.85;
      }
      .modal-btn-cancel {
        background: var(--bg);
        color: var(--ink-light);
        border: 1px solid var(--line);
      }

      /* Emotion flow */
      .emotion-flow {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      .emotion-chip {
        font-size: 11px;
        padding: 4px 12px;
        border-radius: 20px;
        border: 1px solid var(--line);
        color: var(--ink-light);
        cursor: pointer;
        transition: all 0.2s;
        font-family: "Noto Sans KR";
        background: var(--bg);
      }
      .emotion-chip:hover,
      .emotion-chip.active {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-faint);
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--line);
        border-radius: 2px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--accent-light);
      }

      @media (max-width: 900px) {
        .sidenotes-col {
          display: none;
        }
        .right-panel {
          display: none;
        }
      }

      /* ══════════════════════════════════
     MOBILE PATTERNS (max-width: 768px)
     ══════════════════════════════════ */
      @media (max-width: 768px) {
        .sidebar {
          display: none;
        }
        .right-panel {
          display: none;
        }
        .sidenotes-col {
          display: none !important;
        }
        .app {
          flex-direction: column;
        }

        .topbar {
          padding: 10px 16px;
        }
        .stage-selector {
          display: none;
        }
        .doc-title-input {
          font-size: 15px;
        }

        .editor-wrapper {
          padding: 28px 20px 100px;
        }
        .editor-area {
          font-size: 17px;
          line-height: 2.1;
        }

        /* 문단별 앵커 점 */
        .para-note-anchor {
          display: inline-flex !important;
          align-items: center;
          justify-content: center;
          width: 18px;
          height: 18px;
          border-radius: 50%;
          background: var(--accent);
          color: white;
          font-size: 10px;
          font-weight: 700;
          position: absolute;
          left: -28px;
          cursor: pointer;
          transition: transform 0.15s;
          box-shadow: 0 1px 6px var(--shadow);
        }
        .para-note-anchor:hover {
          transform: scale(1.15);
        }
        .para-note-anchor.empty {
          background: var(--line);
          color: var(--ink-faint);
        }

        /* 모바일 하단 툴바 */
        .mobile-toolbar {
          display: flex !important;
          position: fixed;
          bottom: 0;
          left: 0;
          right: 0;
          background: var(--paper);
          border-top: 1px solid var(--line);
          padding: 10px 20px calc(10px + env(safe-area-inset-bottom));
          gap: 0;
          z-index: 50;
        }
        .mobile-toolbar-btn {
          flex: 1;
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 4px;
          font-size: 10px;
          color: var(--ink-light);
          cursor: pointer;
          padding: 4px;
          transition: color 0.2s;
          font-family: "Noto Sans KR";
          border: none;
          background: none;
        }
        .mobile-toolbar-btn .m-icon {
          font-size: 20px;
        }
        .mobile-toolbar-btn.accent {
          color: var(--accent);
        }

        .statusbar {
          padding: 8px 16px;
          font-size: 11px;
        }
      }

      /* 앵커 점 — 데스크탑에서는 숨김 */
      .para-note-anchor {
        display: none;
      }

      /* ══════════════════════════════════
     BOTTOM SHEET
     ══════════════════════════════════ */
      .bottom-sheet-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.35);
        z-index: 300;
        display: none;
        align-items: flex-end;
        backdrop-filter: blur(2px);
      }
      .bottom-sheet-overlay.open {
        display: flex;
      }
      .bottom-sheet {
        width: 100%;
        background: var(--paper);
        border-radius: 20px 20px 0 0;
        padding: 0 0 calc(20px + env(safe-area-inset-bottom));
        max-height: 80vh;
        display: flex;
        flex-direction: column;
        box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.2);
        transform: translateY(100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .bottom-sheet-overlay.open .bottom-sheet {
        transform: translateY(0);
      }
      .bs-handle-area {
        padding: 12px;
        display: flex;
        justify-content: center;
        cursor: grab;
      }
      .bs-handle {
        width: 36px;
        height: 4px;
        border-radius: 2px;
        background: var(--line);
      }
      .bs-header {
        padding: 0 20px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--line);
      }
      .bs-title {
        font-size: 15px;
        font-weight: 500;
        color: var(--ink);
        font-family: "Noto Serif KR";
      }
      .bs-close {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: var(--bg);
        border: none;
        cursor: pointer;
        color: var(--ink-light);
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .bs-body {
        flex: 1;
        overflow-y: auto;
        padding: 16px 20px;
      }

      /* 바텀시트 — 메모 리스트 */
      .bs-note-item {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        padding: 12px 0;
        border-bottom: 1px solid var(--line);
      }
      .bs-note-item:last-child {
        border-bottom: none;
      }
      .bs-note-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
        margin-top: 6px;
        flex-shrink: 0;
      }
      .bs-note-text {
        font-size: 14px;
        line-height: 1.7;
        color: var(--ink);
        font-family: "Noto Serif KR";
        flex: 1;
      }
      .bs-note-time {
        font-size: 11px;
        color: var(--ink-faint);
        margin-top: 4px;
        font-family: "Noto Sans KR";
      }
      .bs-note-del {
        font-size: 16px;
        color: var(--ink-faint);
        cursor: pointer;
        padding: 2px;
        transition: color 0.2s;
        flex-shrink: 0;
        background: none;
        border: none;
      }
      .bs-note-del:hover {
        color: #c0392b;
      }
      .bs-add-area {
        padding: 12px 20px 0;
        border-top: 1px solid var(--line);
      }
      .bs-input-row {
        display: flex;
        gap: 8px;
        align-items: flex-end;
      }
      .bs-textarea {
        flex: 1;
        min-height: 48px;
        max-height: 120px;
        resize: none;
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px 14px;
        font-family: "Noto Serif KR";
        font-size: 14px;
        color: var(--ink);
        outline: none;
        line-height: 1.6;
        transition: border-color 0.2s;
      }
      .bs-textarea:focus {
        border-color: var(--accent);
      }
      .bs-send-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--accent);
        color: white;
        border: none;
        font-size: 16px;
        cursor: pointer;
        flex-shrink: 0;
        transition: opacity 0.2s;
      }
      .bs-send-btn:hover {
        opacity: 0.85;
      }

      /* 롱프레스 힌트 팝업 */
      .longpress-hint {
        position: fixed;
        z-index: 400;
        background: var(--ink);
        color: var(--paper);
        border-radius: 10px;
        padding: 8px 14px;
        font-size: 13px;
        font-family: "Noto Sans KR";
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.2s;
        white-space: nowrap;
      }
      .longpress-hint.show {
        opacity: 1;
      }

      /* 모바일 툴바 — 데스크탑에서 숨김 */
      .mobile-toolbar {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="app" id="app">
      <!-- LEFT SIDEBAR -->
      <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="logo">수필 <span>사유의 공간</span></div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-section">
            <div class="nav-label">나의 글</div>
            <div class="nav-item active" onclick="switchDoc(0)">
              <span class="icon">🌿</span> 봄날의 고요함
              <span class="stage-badge">초안</span>
            </div>
            <div class="nav-item" onclick="switchDoc(1)">
              <span class="icon">🌱</span> 기억의 질감
            </div>
            <div class="nav-item" onclick="switchDoc(2)">
              <span class="icon">🌸</span> 오래된 골목
              <span class="stage-badge" style="background: #9b7a30">씨앗</span>
            </div>
            <div class="nav-item" onclick="newDoc()">
              <span class="icon">＋</span> 새 수필
            </div>
          </div>
          <div class="nav-section">
            <div class="nav-label">단상 서랍</div>
            <div class="nav-item" onclick="showPanel('fragment')">
              <span class="icon">🗂</span> 흩어진 생각들
              <span class="stage-badge" style="background: var(--ink-faint)"
                >5</span
              >
            </div>
          </div>
          <div class="nav-section">
            <div class="nav-label">둘러보기</div>
            <div class="nav-item">
              <span class="icon">📚</span> 이번 주 선집
            </div>
            <div class="nav-item"><span class="icon">🔖</span> 감상한 글</div>
          </div>
        </nav>
        <div class="sidebar-footer">
          <div class="theme-toggle" onclick="toggleTheme()" id="themeToggle">
            ☀️ 낮 모드
          </div>
        </div>
      </div>

      <!-- MAIN -->
      <div class="main">
        <!-- TOPBAR -->
        <div class="topbar">
          <div class="topbar-left">
            <div class="sidebar-toggle" onclick="toggleSidebar()">☰</div>
            <input
              class="doc-title-input"
              id="docTitle"
              value="봄날의 고요함"
              placeholder="제목 없음"
            />
          </div>
          <div class="topbar-right">
            <div class="stage-selector">
              <button class="stage-btn" onclick="setStage(this, '씨앗')">
                🌱 씨앗
              </button>
              <button class="stage-btn active" onclick="setStage(this, '초안')">
                🌿 초안
              </button>
              <button class="stage-btn" onclick="setStage(this, '완성')">
                🌸 완성
              </button>
            </div>
            <button
              class="icon-btn"
              title="사유 질문 (AI)"
              onclick="showPanel('ai')"
              id="aiBtnTop"
            >
              🤔
            </button>
            <button
              class="icon-btn"
              title="읽기 모드"
              onclick="toggleReadMode()"
              id="readModeBtn"
            >
              👁
            </button>
            <button
              class="icon-btn"
              title="단상 서랍"
              onclick="showPanel('fragment')"
              id="fragBtnTop"
            >
              🗂
            </button>
            <button
              class="icon-btn active"
              title="여백 메모"
              onclick="toggleSidenotes()"
            >
              📝
            </button>
          </div>
        </div>

        <!-- EDITOR WRAPPER -->
        <div class="editor-wrapper" id="editorWrapper">
          <div class="editor-container" id="editorContainer">
            <div class="editor-content">
              <!-- Write mode -->
              <textarea
                class="editor-area"
                id="editorArea"
                placeholder="이 순간, 무엇이 떠오르나요&#10;&#10;쓰는 행위 자체가 사유의 시작입니다..."
                spellcheck="false"
              ></textarea>
              <!-- Read mode -->
              <div class="read-view" id="readView">
                <div id="readViewContent"></div>
              </div>
            </div>
            <div class="sidenotes-col" id="sidenotesCol">
              <div class="sidenote">
                <span class="sidenote-time">3분 전</span>
                봄의 고요함은 소음의 부재가 아니라, 소음이 익숙해진 상태일 수도.
              </div>
              <div class="sidenote">
                <span class="sidenote-time">어제</span>
                → 이 부분 더 길게 전개해보기. "익숙해진다"는 것의 의미.
              </div>
              <div class="add-sidenote" onclick="addSidenote()">
                + 여백 메모
              </div>
            </div>
          </div>
        </div>

        <!-- STATUS BAR -->
        <div class="statusbar" id="statusbar">
          <span>✍️ <span id="wordCount">0</span>자</span>
          <span>📖 읽기 약 <span id="readTime">0</span>분</span>
          <span>
            문단 호흡
            <div class="breath-meter" id="breathMeter">
              <div class="breath-bar" style="height: 8px"></div>
              <div class="breath-bar" style="height: 14px"></div>
              <div class="breath-bar" style="height: 10px"></div>
              <div class="breath-bar" style="height: 18px"></div>
              <div class="breath-bar" style="height: 12px"></div>
            </div>
          </span>
          <div class="saved-indicator" id="savedIndicator">
            <span style="color: var(--accent)">●</span> 저장됨
          </div>
        </div>
      </div>

      <!-- RIGHT PANEL -->
      <div class="right-panel hidden" id="rightPanel">
        <div class="panel-tabs">
          <div
            class="panel-tab active"
            id="tabFragment"
            onclick="switchTab('fragment')"
          >
            🗂 단상 서랍
          </div>
          <div class="panel-tab" id="tabAi" onclick="switchTab('ai')">
            🤔 사유 질문
          </div>
        </div>
        <div class="panel-body" id="panelBody">
          <!-- injected by JS -->
        </div>
      </div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <div class="modal-title">단상 포착 ✨</div>
        <textarea
          id="fragmentInput"
          placeholder="지금 스치는 생각을 그대로 던져두세요&#10;다듬지 않아도 됩니다"
        ></textarea>
        <div class="modal-actions">
          <button class="modal-btn modal-btn-cancel" onclick="closeModal()">
            취소
          </button>
          <button class="modal-btn modal-btn-primary" onclick="saveFragment()">
            서랍에 넣기
          </button>
        </div>
      </div>
    </div>

    <!-- SIDENOTE MODAL -->
    <div class="modal-overlay" id="sidenoteModal">
      <div class="modal">
        <div class="modal-title">여백 메모 📝</div>
        <textarea
          id="sidenoteInput"
          placeholder="지금 쓰고 있는 글 옆에 남기고 싶은 생각..."
        ></textarea>
        <div class="modal-actions">
          <button
            class="modal-btn modal-btn-cancel"
            onclick="closeSidenoteModal()"
          >
            취소
          </button>
          <button class="modal-btn modal-btn-primary" onclick="saveSidenote()">
            메모 남기기
          </button>
        </div>
      </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
      // ── STATE ──
      let currentTheme = 'day';
      let sidebarOpen = true;
      let rightPanelOpen = false;
      let rightPanelTab = 'fragment';
      let readMode = false;
      let sidenotesVisible = true;
      let saveTimer = null;

      const docs = [
        {
          title: '봄날의 고요함',
          stage: '초안',
          content: `봄이 오면 나는 이상하게도 더 조용해진다.

      꽃이 피고 새가 울고 사람들이 거리로 나오는 계절인데, 나는 오히려 방 안에 더 깊이 앉아 있고 싶어진다. 창문 너머로 들어오는 빛의 각도가 달라지면서, 먼지들이 천천히 떠다니는 걸 멍하니 바라본다.

      이 고요함은 무엇일까. 소음이 없는 상태가 아니라, 소음이 더 이상 나를 당기지 않는 상태. 세상이 활발해질수록 나는 그 반대편 어딘가로 천천히 걸어가는 것 같다.

      아마도 봄의 과잉이 나를 그렇게 만드는 것 같다. 너무 많은 것들이 동시에 시작되는 계절. 나는 그 시작들 사이에서 내가 끝내지 못한 것들을 생각한다.`
        },
        { title: '기억의 질감', stage: '씨앗', content: '' },
        { title: '오래된 골목', stage: '씨앗', content: '' }
      ];

      let currentDoc = 0;

      const fragments = [
        { text: '언어는 생각을 담는 그릇이 아니라, 생각이 발생하는 장소다.', stage: 'seed', date: '3일 전' },
        { text: '잊혀진다는 것이 두려운 게 아니라, 잊혀지기 전에 내가 나를 잊는 것이 두렵다.', stage: 'root', date: '1주 전' },
        { text: '고독은 결핍이 아니라 선택의 형태다. 다만 그 선택이 늘 자유롭지는 않다.', stage: 'root', date: '2주 전' },
        { text: '어머니의 목소리 톤 — 기쁨과 걱정이 같은 주파수에서 진동한다.', stage: 'seed', date: '3주 전' },
        { text: '완성된 글은 죽은 글이다. 쓰이고 있는 순간만이 살아있다.', stage: 'bloom', date: '1달 전' },
      ];

      const aiQuestions = [
        { q: '"봄의 고요함"에서 당신이 진짜 말하고 싶은 것은 외로움인가요, 아니면 선택인가요?', hint: '글 1문단 분석' },
        { q: '"끝내지 못한 것들"은 무엇을 가리키나요? 글 안에서 그것을 더 구체적으로 보여줄 수 있을까요?', hint: '마지막 문단' },
        { q: '이 글을 쓰는 "나"와 지금 이 순간의 "나" 사이의 거리는 얼마나 되나요?', hint: '서술 시점' },
      ];

      // ── INIT ──
      window.onload = () => {
        loadDoc(0);
        renderPanel();
        setupEditor();
      };

      function setupEditor() {
        const editor = document.getElementById('editorArea');
        editor.addEventListener('input', () => {
          updateStats();
          scheduleSave();
        });
        editor.addEventListener('keydown', e => {
          if (e.key === 'Tab') { e.preventDefault(); insertText('    '); }
        });
      }

      function insertText(text) {
        const el = document.getElementById('editorArea');
        const s = el.selectionStart, end = el.selectionEnd;
        el.value = el.value.substring(0,s) + text + el.value.substring(end);
        el.selectionStart = el.selectionEnd = s + text.length;
      }

      function loadDoc(idx) {
        currentDoc = idx;
        document.getElementById('docTitle').value = docs[idx].title;
        document.getElementById('editorArea').value = docs[idx].content;
        updateStats();
      }

      function switchDoc(idx) { saveCurrentDoc(); loadDoc(idx); }

      function saveCurrentDoc() {
        docs[currentDoc].content = document.getElementById('editorArea').value;
        docs[currentDoc].title = document.getElementById('docTitle').value;
      }

      function newDoc() {
        saveCurrentDoc();
        docs.push({ title: '새 수필', stage: '씨앗', content: '' });
        loadDoc(docs.length - 1);
        showToast('새 수필을 시작합니다 ✨');
      }

      function updateStats() {
        const text = document.getElementById('editorArea').value;
        const chars = text.replace(/\s/g,'').length;
        document.getElementById('wordCount').textContent = chars;
        document.getElementById('readTime').textContent = Math.max(1, Math.ceil(chars / 400));
        updateBreathMeter(text);
      }

      function updateBreathMeter(text) {
        const paras = text.split(/

      +/).filter(p => p.trim());
        const bars = document.querySelectorAll('.breath-bar');
        const heights = [8,12,16,10,14];
        paras.slice(0,5).forEach((p,i) => {
          const len = p.trim().length;
          heights[i] = Math.min(24, Math.max(4, Math.floor(len/20)));
        });
        bars.forEach((b,i) => { b.style.height = (heights[i]||4) + 'px'; });
      }

      function scheduleSave() {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {
          saveCurrentDoc();
          const ind = document.getElementById('savedIndicator');
          ind.classList.add('show');
          setTimeout(() => ind.classList.remove('show'), 2000);
        }, 1500);
      }

      // ── THEME ──
      function toggleTheme() {
        const app = document.getElementById('app');
        const btn = document.getElementById('themeToggle');
        if (currentTheme === 'day') {
          app.setAttribute('data-theme','night');
          btn.innerHTML = '🌙 밤 모드';
          currentTheme = 'night';
        } else {
          app.removeAttribute('data-theme');
          btn.innerHTML = '☀️ 낮 모드';
          currentTheme = 'day';
        }
      }

      // ── SIDEBAR ──
      function toggleSidebar() {
        sidebarOpen = !sidebarOpen;
        document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
      }

      // ── STAGE ──
      function setStage(btn, stage) {
        document.querySelectorAll('.stage-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        docs[currentDoc].stage = stage;
        showToast(`단계를 "${stage}"(으)로 변경했습니다`);
      }

      // ── SIDENOTES ──
      function toggleSidenotes() {
        sidenotesVisible = !sidenotesVisible;
        document.getElementById('sidenotesCol').style.display = sidenotesVisible ? '' : 'none';
      }
      function addSidenote() { document.getElementById('sidenoteModal').classList.add('open'); }
      function closeSidenoteModal() { document.getElementById('sidenoteModal').classList.remove('open'); }
      function saveSidenote() {
        const val = document.getElementById('sidenoteInput').value.trim();
        if (!val) return;
        const col = document.getElementById('sidenotesCol');
        const note = document.createElement('div');
        note.className = 'sidenote';
        note.innerHTML = `<span class="sidenote-time">방금</span>${val}`;
        col.insertBefore(note, col.lastElementChild);
        document.getElementById('sidenoteInput').value = '';
        closeSidenoteModal();
        showToast('여백 메모를 남겼습니다 📝');
      }

      // ── READ MODE ──
      function toggleReadMode() {
        readMode = !readMode;
        const editor = document.getElementById('editorArea');
        const readView = document.getElementById('readView');
        const btn = document.getElementById('readModeBtn');
        if (readMode) {
          saveCurrentDoc();
          const text = docs[currentDoc].content;
          const paragraphs = text.split(/

      +/).filter(p=>p.trim());
          readView.querySelector('#readViewContent').innerHTML = paragraphs.map(p =>
            `<p>${p.replace(/
      /g,'<br>')}</p>`
          ).join('');
          editor.style.display = 'none';
          readView.classList.add('active');
          btn.style.color = 'var(--accent)';
          showToast('읽기 모드로 전환 — 문장을 선택해 반응해보세요 👁');
        } else {
          editor.style.display = '';
          readView.classList.remove('active');
          btn.style.color = '';
        }
      }

      // ── RIGHT PANEL ──
      function showPanel(tab) {
        rightPanelOpen = true;
        rightPanelTab = tab;
        document.getElementById('rightPanel').classList.remove('hidden');
        switchTab(tab);
      }
      function switchTab(tab) {
        rightPanelTab = tab;
        document.getElementById('tabFragment').classList.toggle('active', tab==='fragment');
        document.getElementById('tabAi').classList.toggle('active', tab==='ai');
        renderPanel();
      }
      function renderPanel() {
        const body = document.getElementById('panelBody');
        if (rightPanelTab === 'fragment') {
          body.innerHTML = `
            <button class="add-fragment-btn" onclick="openModal()">＋ 지금 떠오르는 단상 포착하기</button>
            ${fragments.map((f,i) => `
              <div class="fragment-card" onclick="insertFragment(${i})">
                <div class="fragment-text">${f.text}</div>
                <div class="fragment-meta">
                  <span>${f.date}</span>
                  <span class="fragment-stage ${f.stage}">${f.stage==='seed'?'🌱 씨앗':f.stage==='root'?'🌿 뿌리':'🌸 완성'}</span>
                </div>
              </div>
            `).join('')}
          `;
        } else {
          body.innerHTML = `
            <p style="font-size:12px;color:var(--ink-faint);margin-bottom:16px;font-family:'Noto Sans KR'">
              AI가 지금 쓰고 있는 글을 읽고 사유를 깊게 하는 질문을 던집니다.
            </p>
            ${aiQuestions.map((q,i) => `
              <div class="ai-question">
                <div class="ai-q-text">${q.q}</div>
                <div class="ai-q-meta">📍 ${q.hint}</div>
                <textarea class="ai-answer-input" placeholder="생각을 자유롭게 써보세요...&#10;이 답변이 글의 씨앗이 됩니다"></textarea>
                <div>
                  <button class="ai-btn ai-btn-primary" onclick="insertAiAnswer(this)">→ 글에 이어 쓰기</button>
                  <button class="ai-btn ai-btn-secondary" onclick="nextQuestion(${i})">다음 질문</button>
                </div>
              </div>
            `).join('')}
          `;
        }
      }

      function openModal() { document.getElementById('modalOverlay').classList.add('open'); }
      function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
      function saveFragment() {
        const val = document.getElementById('fragmentInput').value.trim();
        if (!val) return;
        fragments.unshift({ text: val, stage: 'seed', date: '방금' });
        document.getElementById('fragmentInput').value = '';
        closeModal();
        renderPanel();
        showToast('단상을 서랍에 넣었습니다 🗂');
      }
      function insertFragment(i) {
        const editor = document.getElementById('editorArea');
        const val = fragments[i].text;
        insertText('

      ' + val + '

      ');
        editor.focus();
        showToast('단상을 글에 삽입했습니다 ✨');
      }
      function insertAiAnswer(btn) {
        const ta = btn.parentElement.previousElementSibling;
        const val = ta.value.trim();
        if (!val) { showToast('먼저 생각을 적어보세요'); return; }
        const editor = document.getElementById('editorArea');
        insertText('

      ' + val);
        editor.focus();
        showToast('생각이 글에 이어졌습니다 🌱');
      }
      function nextQuestion(i) { showToast('더 많은 질문은 곧 제공됩니다'); }

      // ── TOAST ──
      function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2200);
      }

      // ── KEYBOARD SHORTCUTS ──
      document.addEventListener('keydown', e => {
        if ((e.metaKey||e.ctrlKey) && e.key==='\') { toggleSidebar(); e.preventDefault(); }
        if ((e.metaKey||e.ctrlKey) && e.key==='Enter') { toggleReadMode(); e.preventDefault(); }
        if ((e.metaKey||e.ctrlKey) && e.key==='k') { openModal(); e.preventDefault(); }
      });

      // Init editor with sample text
      window.addEventListener('load', () => {
        document.getElementById('editorArea').value = docs[0].content;
        updateStats();
      });

      // ── MOBILE BOTTOM SHEET ──
      const mobileNotes = [
        { text: '봄의 고요함 — 소음의 부재가 아니라 소음이 익숙해진 상태.', time: '3분 전' },
        { text: '→ "끝내지 못한 것들" 더 구체적으로 풀어보기.', time: '어제' },
      ];
      let bsMode = 'note';

      function openBs(mode) {
        bsMode = mode;
        const overlay = document.getElementById('bsOverlay');
        const title = document.getElementById('bsTitle');
        const body = document.getElementById('bsBody');
        const addArea = document.querySelector('.bs-add-area');

        if (mode === 'note') {
          title.textContent = '📝 여백 메모';
          addArea.style.display = '';
          body.innerHTML = mobileNotes.length === 0
            ? '<p style="color:var(--ink-faint);font-size:14px;text-align:center;padding:24px 0">아직 메모가 없습니다</p>'
            : mobileNotes.map((n,i) => `
              <div class="bs-note-item">
                <div class="bs-note-dot"></div>
                <div style="flex:1">
                  <div class="bs-note-text">${n.text}</div>
                  <div class="bs-note-time">${n.time}</div>
                </div>
                <button class="bs-note-del" onclick="deleteBsNote(${i})">×</button>
              </div>
            `).join('');
        } else if (mode === 'fragment') {
          title.textContent = '🗂 단상 서랍';
          addArea.style.display = 'none';
          body.innerHTML = `
            <div style="margin-bottom:12px">
              <button style="width:100%;padding:12px;border:1.5px dashed var(--line);border-radius:10px;background:none;font-size:13px;color:var(--ink-faint);cursor:pointer;font-family:Noto Sans KR" onclick="closeBsBtn();openModal()">＋ 지금 단상 포착하기</button>
            </div>
            ${fragments.map((f,i) => `
              <div class="bs-note-item" style="cursor:pointer" onclick="insertFragment(${i});closeBsBtn()">
                <div class="bs-note-dot" style="background:${f.stage==='seed'?'#9B7A30':f.stage==='root'?'#3D7A52':'#7A4A9B'}"></div>
                <div style="flex:1">
                  <div class="bs-note-text">${f.text}</div>
                  <div class="bs-note-time">${f.date} · ${f.stage==='seed'?'🌱 씨앗':f.stage==='root'?'🌿 뿌리':'🌸 완성'}</div>
                </div>
              </div>
            `).join('')}
          `;
        } else if (mode === 'ai') {
          title.textContent = '🤔 사유 질문';
          addArea.style.display = 'none';
          body.innerHTML = aiQuestions.map((q,i) => `
            <div style="margin-bottom:20px;padding:16px;background:var(--accent-faint);border-radius:12px;border:1px solid var(--accent-light)">
              <div style="font-family:Noto Serif KR;font-size:15px;line-height:1.8;color:var(--ink);margin-bottom:8px">${q.q}</div>
              <div style="font-size:11px;color:var(--accent);margin-bottom:10px;font-family:Noto Sans KR">📍 ${q.hint}</div>
              <textarea style="width:100%;min-height:72px;resize:none;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px;font-family:Noto Serif KR;font-size:14px;color:var(--ink);outline:none;line-height:1.6" placeholder="생각을 자유롭게..."></textarea>
            </div>
          `).join('');
        }

        overlay.classList.add('open');
        document.getElementById('bsTextarea').value = '';
      }

      function closeBs(e) {
        if (e.target === document.getElementById('bsOverlay')) closeBsBtn();
      }
      function closeBsBtn() {
        document.getElementById('bsOverlay').classList.remove('open');
      }
      function saveBsNote() {
        const val = document.getElementById('bsTextarea').value.trim();
        if (!val) return;
        mobileNotes.unshift({ text: val, time: '방금' });
        document.getElementById('bsTextarea').value = '';
        openBs('note');
        showToast('메모를 남겼습니다 📝');
      }
      function deleteBsNote(i) {
        mobileNotes.splice(i, 1);
        openBs('note');
      }

      // 롱프레스 → 메모 추가 힌트
      let lpTimer = null;
      document.addEventListener('touchstart', e => {
        const el = e.target.closest('.editor-area, .read-view');
        if (!el) return;
        const hint = document.getElementById('longpressHint');
        lpTimer = setTimeout(() => {
          hint.style.left = (e.touches[0].clientX - 80) + 'px';
          hint.style.top = (e.touches[0].clientY - 48) + 'px';
          hint.classList.add('show');
          setTimeout(() => hint.classList.remove('show'), 1200);
          openBs('note');
        }, 600);
      }, { passive: true });
      document.addEventListener('touchend', () => clearTimeout(lpTimer), { passive: true });
      document.addEventListener('touchmove', () => clearTimeout(lpTimer), { passive: true });
    </script>

    <!-- BOTTOM SHEET (여백 메모) -->
    <div class="bottom-sheet-overlay" id="bsOverlay" onclick="closeBs(event)">
      <div class="bottom-sheet" id="bottomSheet">
        <div class="bs-handle-area"><div class="bs-handle"></div></div>
        <div class="bs-header">
          <div class="bs-title" id="bsTitle">📝 여백 메모</div>
          <button class="bs-close" onclick="closeBsBtn()">✕</button>
        </div>
        <div class="bs-body" id="bsBody">
          <!-- 메모 목록 -->
        </div>
        <div class="bs-add-area">
          <div class="bs-input-row">
            <textarea
              class="bs-textarea"
              id="bsTextarea"
              placeholder="이 순간 스치는 생각을 남겨두세요..."
            ></textarea>
            <button class="bs-send-btn" onclick="saveBsNote()">↑</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 롱프레스 힌트 -->
    <div class="longpress-hint" id="longpressHint">📝 여백 메모 추가</div>

    <!-- 모바일 하단 툴바 -->
    <div class="mobile-toolbar">
      <button class="mobile-toolbar-btn" onclick="toggleTheme()">
        <span class="m-icon">☀️</span>테마
      </button>
      <button class="mobile-toolbar-btn" onclick="openBs('fragment')">
        <span class="m-icon">🗂</span>단상
      </button>
      <button class="mobile-toolbar-btn accent" onclick="openBs('note')">
        <span class="m-icon">📝</span>메모
      </button>
      <button class="mobile-toolbar-btn" onclick="openBs('ai')">
        <span class="m-icon">🤔</span>사유
      </button>
      <button class="mobile-toolbar-btn" onclick="toggleReadMode()">
        <span class="m-icon">👁</span>읽기
      </button>
    </div>
  </body>
</html>
