<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>에세이 작성</title>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
      @theme {
        --color-paper: #f8f6f1;
        --color-paper-dark: #efede6;
        --color-ink: #2a2a35;
        --color-ink-light: #6b6b7a;
        --color-navy: #1e2240;
        --color-navy-light: #2d3560;
        --color-accent: #4c6eaf;
        --color-accent-light: #e8edf6;
        --color-gold: #c9a84c;
        --color-sage: #7a9e87;
        --color-border: #ddd9d0;
      }
    </style>

    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: "Noto Sans KR", sans-serif;
        background-color: #f8f6f1;
        color: #2a2a35;
        overflow: hidden;
        height: 100dvh;
      }

      /* ─── Sidebar ─── */
      .sidebar {
        width: 64px;
        background: #1e2240;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px 0;
        gap: 8px;
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 40;
        box-shadow: 2px 0 16px rgba(0, 0, 0, 0.12);
      }
      .sidebar-logo {
        width: 36px;
        height: 36px;
        background: #c9a84c;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Noto Serif KR", serif;
        font-weight: 600;
        color: #1e2240;
        font-size: 15px;
        margin-bottom: 16px;
        box-shadow: 0 2px 8px rgba(201, 168, 76, 0.35);
      }
      .sidebar-spacer {
        flex: 1;
      }
      .nav-btn {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: rgba(255, 255, 255, 0.45);
        font-size: 20px;
        transition: all 0.18s ease;
        position: relative;
      }
      .nav-btn:hover {
        background: rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.85);
      }
      .nav-btn.active {
        background: rgba(76, 110, 175, 0.25);
        color: #7fa8e0;
      }
      .nav-btn .tooltip {
        position: absolute;
        left: 52px;
        top: 50%;
        transform: translateY(-50%);
        background: #2a2a35;
        color: #fff;
        font-size: 12px;
        padding: 4px 10px;
        border-radius: 6px;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.15s;
      }
      .nav-btn:hover .tooltip {
        opacity: 1;
      }

      /* ─── Main Layout ─── */
      .main-wrapper {
        margin-left: 64px;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ─── Header ─── */
      .top-header {
        height: 52px;
        border-bottom: 1px solid #ddd9d0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        background: #f8f6f1;
        flex-shrink: 0;
      }
      .save-status {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 13px;
        color: #6b6b7a;
        font-family: "Noto Sans KR", sans-serif;
        font-weight: 400;
      }
      .save-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #7a9e87;
        transition: background 0.3s;
      }
      .save-dot.saving {
        background: #c9a84c;
        animation: pulse-dot 0.9s ease-in-out infinite;
      }
      @keyframes pulse-dot {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.35;
        }
      }
      .settings-btn {
        position: relative;
        width: 36px;
        height: 36px;
        border-radius: 9px;
        border: 1px solid #ddd9d0;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: #6b6b7a;
        font-size: 18px;
        background: transparent;
        transition: all 0.15s;
      }
      .settings-btn:hover {
        background: #efede6;
        color: #2a2a35;
        border-color: #c9b89a;
      }
      .settings-btn.active {
        background: #2a2a35;
        color: #fff;
        border-color: #2a2a35;
      }

      /* Dropdown */
      .dropdown {
        position: absolute;
        right: 0;
        top: calc(100% + 8px);
        background: #fff;
        border: 1px solid #ddd9d0;
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
        min-width: 200px;
        overflow: hidden;
        z-index: 100;
        opacity: 0;
        transform: translateY(-6px) scale(0.97);
        pointer-events: none;
        transition: all 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .dropdown.open {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: auto;
      }
      .dropdown-section {
        padding: 6px;
        border-bottom: 1px solid #efede6;
      }
      .dropdown-section:last-child {
        border-bottom: none;
      }
      .dropdown-label {
        font-size: 10px;
        font-weight: 500;
        color: #a0a0b0;
        letter-spacing: 0.08em;
        padding: 6px 10px 2px;
        text-transform: uppercase;
      }
      .dropdown-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 10px;
        border-radius: 7px;
        font-size: 13.5px;
        color: #2a2a35;
        cursor: pointer;
        transition: background 0.12s;
      }
      .dropdown-item:hover {
        background: #f8f6f1;
      }
      .dropdown-item i {
        font-size: 16px;
        color: #6b6b7a;
      }
      .dropdown-item.danger {
        color: #c0392b;
      }
      .dropdown-item.danger i {
        color: #c0392b;
      }

      /* ─── Content Row ─── */
      .content-row {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      /* ─── Writing Area ─── */
      .writing-area {
        flex: 1;
        overflow-y: auto;
        padding: 52px 64px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .writing-area::-webkit-scrollbar {
        width: 6px;
      }
      .writing-area::-webkit-scrollbar-track {
        background: transparent;
      }
      .writing-area::-webkit-scrollbar-thumb {
        background: #ddd9d0;
        border-radius: 3px;
      }

      .doc-container {
        width: 100%;
        max-width: 680px;
      }

      .doc-title {
        font-family: "Noto Serif KR", serif;
        font-size: 30px;
        font-weight: 600;
        color: #1e2240;
        border: none;
        outline: none;
        width: 100%;
        background: transparent;
        line-height: 1.4;
        margin-bottom: 8px;
        resize: none;
      }
      .doc-title::placeholder {
        color: #c0bdba;
      }

      .doc-meta {
        font-size: 12.5px;
        color: #a0a0b0;
        margin-bottom: 36px;
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .doc-meta span {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .doc-divider {
        width: 40px;
        height: 2px;
        background: #c9a84c;
        border-radius: 1px;
        margin-bottom: 36px;
      }

      .doc-body {
        font-family: "Noto Serif KR", serif;
        font-size: 16.5px;
        line-height: 2;
        color: #2a2a35;
        border: none;
        outline: none;
        width: 100%;
        background: transparent;
        min-height: 480px;
        resize: none;
      }
      .doc-body::placeholder {
        color: #c0bdba;
      }

      .word-count {
        margin-top: 48px;
        font-size: 12px;
        color: #b0ada8;
        text-align: right;
      }

      /* ─── AI Panel ─── */
      .ai-panel {
        width: 300px;
        background: #efede6;
        border-left: 1px solid #ddd9d0;
        overflow-y: auto;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
      }
      .ai-panel::-webkit-scrollbar {
        width: 4px;
      }
      .ai-panel::-webkit-scrollbar-thumb {
        background: #ddd9d0;
        border-radius: 2px;
      }

      .ai-panel-header {
        padding: 18px 20px 14px;
        border-bottom: 1px solid #ddd9d0;
        background: #e8e5dc;
        flex-shrink: 0;
      }
      .ai-panel-title {
        font-size: 13px;
        font-weight: 500;
        color: #1e2240;
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 4px;
      }
      .ai-panel-title i {
        color: #4c6eaf;
        font-size: 16px;
      }
      .ai-panel-sub {
        font-size: 11.5px;
        color: #8a8a9a;
      }

      .ai-panel-body {
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        flex: 1;
      }

      .ai-card {
        background: #fff;
        border-radius: 12px;
        border: 1px solid #ddd9d0;
        overflow: hidden;
        transition: box-shadow 0.18s;
      }
      .ai-card:hover {
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.07);
      }

      .ai-card-head {
        padding: 14px 16px 12px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        cursor: pointer;
        user-select: none;
      }
      .ai-card-icon {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        flex-shrink: 0;
      }
      .ai-card-icon.spell {
        background: #edf3ff;
        color: #4c6eaf;
      }
      .ai-card-icon.feedback {
        background: #f0f9f2;
        color: #7a9e87;
      }
      .ai-card-icon.improve {
        background: #fdf6e8;
        color: #c9a84c;
      }
      .ai-card-icon.readability {
        background: #fef0f0;
        color: #c0392b;
      }
      .ai-card-icon.structure {
        background: #f5f0ff;
        color: #8b5cf6;
      }

      .ai-card-info {
        flex: 1;
        padding: 0 12px;
      }
      .ai-card-name {
        font-size: 13px;
        font-weight: 500;
        color: #2a2a35;
      }
      .ai-card-desc {
        font-size: 11.5px;
        color: #8a8a9a;
        margin-top: 2px;
        line-height: 1.5;
      }

      .ai-toggle {
        color: #b0ada8;
        font-size: 14px;
        transition: transform 0.2s;
      }
      .ai-toggle.open {
        transform: rotate(180deg);
      }

      .ai-card-content {
        max-height: 0;
        overflow: hidden;
        transition:
          max-height 0.3s ease,
          padding 0.2s;
        padding: 0 16px;
      }
      .ai-card-content.open {
        max-height: 400px;
        padding: 0 16px 14px;
      }

      .ai-run-btn {
        width: 100%;
        padding: 9px 14px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        border: none;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
      }
      .ai-run-btn.primary {
        background: #2a2a35;
        color: #fff;
      }
      .ai-run-btn.primary:hover {
        background: #1e2240;
      }
      .ai-run-btn.secondary {
        background: transparent;
        border: 1px solid #ddd9d0;
        color: #6b6b7a;
      }
      .ai-run-btn.secondary:hover {
        background: #f8f6f1;
        border-color: #c9b89a;
      }

      .ai-result {
        margin-top: 10px;
        padding: 10px 12px;
        background: #f8f6f1;
        border-radius: 8px;
        font-size: 12.5px;
        line-height: 1.65;
        color: #3a3a48;
        border-left: 3px solid #4c6eaf;
      }
      .ai-result.success {
        border-left-color: #7a9e87;
      }
      .ai-result.warning {
        border-left-color: #c9a84c;
      }
      .ai-result.hidden {
        display: none;
      }

      .spell-item {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 7px 0;
        border-bottom: 1px solid #efede6;
        font-size: 12px;
      }
      .spell-item:last-child {
        border-bottom: none;
      }
      .spell-wrong {
        color: #c0392b;
        text-decoration: line-through;
        font-weight: 500;
      }
      .spell-right {
        color: #27ae60;
        font-weight: 500;
      }
      .spell-arrow {
        color: #b0ada8;
      }

      /* Loading spinner */
      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        display: none;
      }
      .loading .spinner {
        display: block;
      }
      .loading .btn-label {
        display: none;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Readability score */
      .score-bar {
        height: 6px;
        border-radius: 3px;
        background: #efede6;
        margin: 8px 0 4px;
        overflow: hidden;
      }
      .score-fill {
        height: 100%;
        border-radius: 3px;
        background: linear-gradient(90deg, #4c6eaf, #7a9e87);
        transition: width 0.5s ease;
      }
      .score-label {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: #8a8a9a;
      }

      /* ─── Bottom Nav (Mobile) ─── */
      .bottom-nav {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #1e2240;
        padding: 10px 0 max(10px, env(safe-area-inset-bottom));
        z-index: 50;
        box-shadow: 0 -2px 16px rgba(0, 0, 0, 0.15);
      }
      .bottom-nav-inner {
        display: flex;
        justify-content: space-around;
        align-items: center;
      }
      .bnav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        cursor: pointer;
        color: rgba(255, 255, 255, 0.45);
        font-size: 11px;
        padding: 4px 16px;
        transition: color 0.15s;
      }
      .bnav-item.active {
        color: #7fa8e0;
      }
      .bnav-item i {
        font-size: 22px;
      }

      /* ─── Mobile AI Toggle Button ─── */
      .ai-fab {
        display: none;
        position: fixed;
        bottom: 76px;
        right: 20px;
        width: 48px;
        height: 48px;
        background: #4c6eaf;
        border-radius: 50%;
        color: #fff;
        font-size: 22px;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 16px rgba(76, 110, 175, 0.4);
        cursor: pointer;
        z-index: 45;
        border: none;
        transition: background 0.15s;
      }
      .ai-fab:hover {
        background: #3a5a9e;
      }

      /* AI Panel Mobile Overlay */
      .ai-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.35);
        z-index: 48;
      }
      .ai-panel-mobile {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 70dvh;
        background: #efede6;
        border-radius: 20px 20px 0 0;
        z-index: 49;
        overflow-y: auto;
        transform: translateY(100%);
        transition: transform 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
      }
      .ai-panel-mobile.open {
        transform: translateY(0);
      }

      .mobile-drag-handle {
        width: 40px;
        height: 4px;
        background: #c0bdb8;
        border-radius: 2px;
        margin: 12px auto 0;
      }

      /* ─── Responsive ─── */
      @media (max-width: 900px) {
        .ai-panel {
          display: none;
        }
        .ai-fab {
          display: flex;
        }
        .ai-overlay {
          display: block;
          pointer-events: none;
        }
        .ai-panel-mobile {
          display: block;
        }
      }
      @media (max-width: 640px) {
        .sidebar {
          display: none;
        }
        .main-wrapper {
          margin-left: 0;
          padding-bottom: 64px;
        }
        .bottom-nav {
          display: flex;
          flex-direction: column;
        }
        .writing-area {
          padding: 32px 24px;
        }
        .doc-title {
          font-size: 22px;
        }
        .doc-body {
          font-size: 15px;
        }
      }
      @media (min-width: 641px) and (max-width: 900px) {
        .writing-area {
          padding: 44px 48px;
        }
      }

      /* Scrollbar global */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #ddd9d0;
        border-radius: 3px;
      }

      /* Subtle focus */
      textarea:focus {
        outline: none;
      }

      /* transition overlay */
      .ai-overlay.show {
        pointer-events: auto;
        background: rgba(0, 0, 0, 0.35);
        transition: background 0.2s;
      }
    </style>
  </head>
  <body>
    <!-- ─── Sidebar ─── -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-logo">글</div>
      <div class="nav-btn active" title="">
        <i class="ri-home-5-line"></i>
        <span class="tooltip">홈</span>
      </div>
      <div class="nav-btn" title="">
        <i class="ri-graduation-cap-line"></i>
        <span class="tooltip">학습</span>
      </div>
      <div class="nav-btn" title="">
        <i class="ri-edit-2-line"></i>
        <span class="tooltip">작성</span>
      </div>
      <div class="nav-btn" title="">
        <i class="ri-archive-line"></i>
        <span class="tooltip">보관함</span>
      </div>
      <div class="sidebar-spacer"></div>
      <div class="nav-btn" title="">
        <i class="ri-user-3-line"></i>
        <span class="tooltip">프로필</span>
      </div>
    </nav>

    <!-- ─── Main Wrapper ─── -->
    <div class="main-wrapper">
      <!-- ─── Header ─── -->
      <header class="top-header">
        <!-- Left: Save Status -->
        <div class="save-status" id="saveStatus">
          <div class="save-dot" id="saveDot"></div>
          <span id="saveText">저장됨</span>
        </div>

        <!-- Right: Settings -->
        <div style="position: relative">
          <button
            class="settings-btn"
            id="settingsBtn"
            onclick="toggleDropdown()"
          >
            <i class="ri-settings-3-line"></i>
          </button>
          <div class="dropdown" id="settingsDropdown">
            <div class="dropdown-section">
              <div class="dropdown-label">내보내기</div>
              <div class="dropdown-item" onclick="closeDropdown()">
                <i class="ri-file-word-line"></i> Word 파일로 저장
              </div>
              <div class="dropdown-item" onclick="closeDropdown()">
                <i class="ri-file-pdf-line"></i> PDF로 저장
              </div>
              <div class="dropdown-item" onclick="closeDropdown()">
                <i class="ri-markdown-line"></i> Markdown 내보내기
              </div>
            </div>
            <div class="dropdown-section">
              <div class="dropdown-label">공유</div>
              <div class="dropdown-item" onclick="closeDropdown()">
                <i class="ri-links-line"></i> 링크 복사
              </div>
              <div class="dropdown-item" onclick="closeDropdown()">
                <i class="ri-mail-send-line"></i> 이메일로 공유
              </div>
            </div>
            <div class="dropdown-section">
              <div class="dropdown-label">문서</div>
              <div class="dropdown-item" onclick="closeDropdown()">
                <i class="ri-history-line"></i> 버전 기록
              </div>
              <div class="dropdown-item" onclick="closeDropdown()">
                <i class="ri-font-size"></i> 글꼴 설정
              </div>
              <div class="dropdown-item" onclick="closeDropdown()">
                <i class="ri-file-copy-line"></i> 복제
              </div>
              <div class="dropdown-item danger" onclick="closeDropdown()">
                <i class="ri-delete-bin-line"></i> 삭제
              </div>
            </div>
          </div>
        </div>
      </header>

      <!-- ─── Content Row ─── -->
      <div class="content-row">
        <!-- ─── Writing Area ─── -->
        <main class="writing-area">
          <div class="doc-container">
            <textarea
              class="doc-title"
              id="docTitle"
              placeholder="제목을 입력하세요..."
              rows="1"
              oninput="
                autoResize(this)
                triggerSave()
              "
            ></textarea>

            <div class="doc-meta">
              <span
                ><i class="ri-calendar-line" style="font-size: 12px"></i>
                <span id="dateLabel"></span
              ></span>
              <span
                ><i class="ri-time-line" style="font-size: 12px"></i>
                <span id="readTime">읽는 시간: 1분</span></span
              >
            </div>

            <div class="doc-divider"></div>

            <textarea
              class="doc-body"
              id="docBody"
              placeholder="생각이 흐르는 대로 자유롭게 적어보세요..."
              oninput="
                autoResize(this)
                triggerSave()
                updateWordCount()
              "
            ></textarea>

            <div class="word-count" id="wordCount">0 자</div>
          </div>
        </main>

        <!-- ─── AI Panel (Desktop) ─── -->
        <aside class="ai-panel">
          <div class="ai-panel-header">
            <div class="ai-panel-title">
              <i class="ri-sparkling-2-line"></i> AI 글쓰기 도우미
            </div>
            <div class="ai-panel-sub">글쓰기 품질을 향상시켜 드릴게요</div>
          </div>
          <div class="ai-panel-body" id="aiPanelBody">
            <!-- Cards rendered by JS -->
          </div>
        </aside>
      </div>
    </div>

    <!-- ─── Bottom Nav (Mobile) ─── -->
    <nav class="bottom-nav">
      <div class="bottom-nav-inner">
        <div class="bnav-item active">
          <i class="ri-home-5-line"></i>
          <span>홈</span>
        </div>
        <div class="bnav-item">
          <i class="ri-graduation-cap-line"></i>
          <span>학습</span>
        </div>
        <div class="bnav-item">
          <i class="ri-edit-2-line"></i>
          <span>작성</span>
        </div>
        <div class="bnav-item">
          <i class="ri-archive-line"></i>
          <span>보관함</span>
        </div>
      </div>
    </nav>

    <!-- ─── AI FAB (Mobile) ─── -->
    <button class="ai-fab" id="aiFab" onclick="openMobileAI()">
      <i class="ri-sparkling-2-line"></i>
    </button>

    <!-- ─── AI Panel Overlay + Sheet (Mobile) ─── -->
    <div class="ai-overlay" id="aiOverlay" onclick="closeMobileAI()"></div>
    <div class="ai-panel-mobile" id="aiPanelMobile">
      <div class="mobile-drag-handle"></div>
      <div class="ai-panel-header" style="margin-top: 12px">
        <div class="ai-panel-title">
          <i class="ri-sparkling-2-line"></i> AI 글쓰기 도우미
        </div>
        <div class="ai-panel-sub">글쓰기 품질을 향상시켜 드릴게요</div>
      </div>
      <div class="ai-panel-body" id="aiPanelBodyMobile">
        <!-- Cards rendered by JS -->
      </div>
    </div>

    <script>
      /* ───────────────────────── Utilities ───────────────────────── */
      function autoResize(el) {
        el.style.height = "auto"
        el.style.height = el.scrollHeight + "px"
      }

      /* ───────────────────────── Date ───────────────────────── */
      ;(function () {
        const d = new Date()
        const fmt = d.toLocaleDateString("ko-KR", {
          year: "numeric",
          month: "long",
          day: "numeric",
        })
        document.getElementById("dateLabel").textContent = fmt
      })()

      /* ───────────────────────── Word Count ───────────────────────── */
      function updateWordCount() {
        const txt = document.getElementById("docBody").value
        const len = txt.length
        document.getElementById("wordCount").textContent =
          len.toLocaleString() + " 자"
        const words = txt.trim() ? txt.trim().split(/\s+/).length : 0
        const mins = Math.max(1, Math.round(words / 200))
        document.getElementById("readTime").textContent = `읽는 시간: ${mins}분`
      }

      /* ───────────────────────── Auto Save ───────────────────────── */
      let saveTimer = null
      function triggerSave() {
        const dot = document.getElementById("saveDot")
        const txt = document.getElementById("saveText")
        dot.classList.add("saving")
        txt.textContent = "저장 중..."
        clearTimeout(saveTimer)
        saveTimer = setTimeout(() => {
          dot.classList.remove("saving")
          txt.textContent = "저장됨"
        }, 1400)
      }

      /* ───────────────────────── Dropdown ───────────────────────── */
      function toggleDropdown() {
        const dd = document.getElementById("settingsDropdown")
        const btn = document.getElementById("settingsBtn")
        const isOpen = dd.classList.contains("open")
        if (isOpen) {
          dd.classList.remove("open")
          btn.classList.remove("active")
        } else {
          dd.classList.add("open")
          btn.classList.add("active")
        }
      }
      function closeDropdown() {
        document.getElementById("settingsDropdown").classList.remove("open")
        document.getElementById("settingsBtn").classList.remove("active")
      }
      document.addEventListener("click", (e) => {
        if (
          !e.target.closest("#settingsBtn") &&
          !e.target.closest("#settingsDropdown")
        )
          closeDropdown()
      })

      /* ───────────────────────── Mobile AI Panel ───────────────────────── */
      function openMobileAI() {
        document.getElementById("aiPanelMobile").classList.add("open")
        document.getElementById("aiOverlay").classList.add("show")
      }
      function closeMobileAI() {
        document.getElementById("aiPanelMobile").classList.remove("open")
        document.getElementById("aiOverlay").classList.remove("show")
      }

      /* ───────────────────────── AI Cards ───────────────────────── */
      const aiCards = [
        {
          id: "spell",
          icon: "ri-spell-check-line",
          iconClass: "spell",
          name: "맞춤법 검사",
          desc: "오타 및 문법 오류를 자동으로 검사합니다",
          btnLabel: "검사 시작",
          btnIcon: "ri-search-2-line",
          action: runSpellCheck,
        },
        {
          id: "feedback",
          icon: "ri-feedback-line",
          iconClass: "feedback",
          name: "피드백 받기",
          desc: "글의 구성과 논리 흐름에 대한 피드백을 받습니다",
          btnLabel: "피드백 받기",
          btnIcon: "ri-chat-check-line",
          action: runFeedback,
        },
        {
          id: "improve",
          icon: "ri-magic-line",
          iconClass: "improve",
          name: "문장 개선",
          desc: "문장을 더 자연스럽고 명확하게 다듬어 드립니다",
          btnLabel: "문장 개선하기",
          btnIcon: "ri-edit-line",
          action: runImprove,
        },
        {
          id: "readability",
          icon: "ri-bar-chart-line",
          iconClass: "readability",
          name: "가독성 분석",
          desc: "글의 가독성 점수와 개선 포인트를 제공합니다",
          btnLabel: "분석하기",
          btnIcon: "ri-line-chart-line",
          action: runReadability,
        },
        {
          id: "structure",
          icon: "ri-mind-map",
          iconClass: "structure",
          name: "글 구조 분석",
          desc: "서론·본론·결론의 구조를 분석하고 제안합니다",
          btnLabel: "구조 분석",
          btnIcon: "ri-node-tree",
          action: runStructure,
        },
      ]

      function buildCardHTML(card, panelId) {
        return `
      <div class="ai-card" id="card-${panelId}-${card.id}">
        <div class="ai-card-head" onclick="toggleCard('${panelId}','${card.id}')">
          <div class="ai-card-icon ${card.iconClass}"><i class="${card.icon}"></i></div>
          <div class="ai-card-info">
            <div class="ai-card-name">${card.name}</div>
            <div class="ai-card-desc">${card.desc}</div>
          </div>
          <i class="ri-arrow-down-s-line ai-toggle" id="toggle-${panelId}-${card.id}"></i>
        </div>
        <div class="ai-card-content" id="content-${panelId}-${card.id}">
          <button class="ai-run-btn primary" id="btn-${panelId}-${card.id}"
            onclick="${card.action.name}('${panelId}','${card.id}')">
            <div class="spinner" id="spinner-${panelId}-${card.id}"></div>
            <span class="btn-label"><i class="${card.btnIcon}"></i> ${card.btnLabel}</span>
          </button>
          <div class="ai-result hidden" id="result-${panelId}-${card.id}"></div>
        </div>
      </div>`
      }

      function renderCards() {
        const panels = ["aiPanelBody", "aiPanelBodyMobile"]
        panels.forEach((pid) => {
          const container = document.getElementById(pid)
          if (!container) return
          container.innerHTML = aiCards
            .map((c) => buildCardHTML(c, pid))
            .join("")
        })
      }

      function toggleCard(panelId, cardId) {
        const content = document.getElementById(`content-${panelId}-${cardId}`)
        const toggle = document.getElementById(`toggle-${panelId}-${cardId}`)
        const isOpen = content.classList.contains("open")
        // Close all in this panel first
        document
          .querySelectorAll(`[id^="content-${panelId}-"]`)
          .forEach((el) => el.classList.remove("open"))
        document
          .querySelectorAll(`[id^="toggle-${panelId}-"]`)
          .forEach((el) => el.classList.remove("open"))
        if (!isOpen) {
          content.classList.add("open")
          toggle.classList.add("open")
        }
      }

      function setLoading(panelId, cardId, on) {
        const btn = document.getElementById(`btn-${panelId}-${cardId}`)
        if (on) btn.classList.add("loading")
        else btn.classList.remove("loading")
        btn.disabled = on
      }

      function showResult(panelId, cardId, html, type = "") {
        const el = document.getElementById(`result-${panelId}-${cardId}`)
        el.innerHTML = html
        el.className = "ai-result" + (type ? " " + type : "")
      }

      /* ─── Actions ─── */
      function runSpellCheck(panelId, cardId) {
        const text = document.getElementById("docBody").value
        if (!text.trim()) {
          showResult(
            panelId,
            cardId,
            "📝 먼저 내용을 작성해 주세요.",
            "warning"
          )
          return
        }
        setLoading(panelId, cardId, true)
        setTimeout(() => {
          setLoading(panelId, cardId, false)
          const html = `
        <div style="font-size:12px;font-weight:500;color:#3A3A48;margin-bottom:8px;">
          <i class="ri-check-double-line" style="color:#7A9E87;"></i> 검사 완료 — 3개 항목 발견
        </div>
        <div class="spell-item">
          <span class="spell-wrong">됬습니다</span>
          <span class="spell-arrow">→</span>
          <span class="spell-right">됐습니다</span>
        </div>
        <div class="spell-item">
          <span class="spell-wrong">왠지</span>
          <span class="spell-arrow">→</span>
          <span class="spell-right">왜인지</span>
        </div>
        <div class="spell-item">
          <span class="spell-wrong">안됩니다</span>
          <span class="spell-arrow">→</span>
          <span class="spell-right">안 됩니다</span>
        </div>`
          showResult(panelId, cardId, html, "success")
        }, 1200)
      }

      function runFeedback(panelId, cardId) {
        const text = document.getElementById("docBody").value
        if (!text.trim()) {
          showResult(
            panelId,
            cardId,
            "📝 먼저 내용을 작성해 주세요.",
            "warning"
          )
          return
        }
        setLoading(panelId, cardId, true)
        setTimeout(() => {
          setLoading(panelId, cardId, false)
          showResult(
            panelId,
            cardId,
            `
        <strong style="font-size:12px;">💬 피드백</strong><br><br>
        글의 도입부가 자연스럽게 독자를 끌어들이고 있습니다. 다만 중반부에서 논지의 흐름이 다소 분산되는 경향이 있어, 핵심 주제로의 연결을 더 명확히 하면 좋겠습니다. 결론에서의 마무리는 간결하고 인상적입니다.
      `
          )
        }, 1500)
      }

      function runImprove(panelId, cardId) {
        const text = document.getElementById("docBody").value
        if (!text.trim()) {
          showResult(
            panelId,
            cardId,
            "📝 먼저 내용을 작성해 주세요.",
            "warning"
          )
          return
        }
        setLoading(panelId, cardId, true)
        setTimeout(() => {
          setLoading(panelId, cardId, false)
          showResult(
            panelId,
            cardId,
            `
        <strong style="font-size:12px;">✨ 개선된 표현 제안</strong><br><br>
        <span style="color:#8A8A9A;text-decoration:line-through;">이것은 매우 중요한 문제입니다.</span><br>
        <span style="color:#27AE60;font-weight:500;">→ 이 문제는 우리가 반드시 짚고 넘어가야 할 핵심입니다.</span><br><br>
        <span style="font-size:11px;color:#8A8A9A;">수동적 표현을 능동적으로 전환하여 더욱 설득력 있는 문장이 됩니다.</span>
      `
          )
        }, 1300)
      }

      function runReadability(panelId, cardId) {
        const text = document.getElementById("docBody").value
        if (!text.trim()) {
          showResult(
            panelId,
            cardId,
            "📝 먼저 내용을 작성해 주세요.",
            "warning"
          )
          return
        }
        setLoading(panelId, cardId, true)
        setTimeout(() => {
          setLoading(panelId, cardId, false)
          showResult(
            panelId,
            cardId,
            `
        <strong style="font-size:12px;">📊 가독성 점수</strong>
        <div class="score-bar"><div class="score-fill" style="width:72%"></div></div>
        <div class="score-label"><span>낮음</span><span style="color:#4C6EAF;font-weight:500;">72 / 100</span><span>높음</span></div>
        <div style="margin-top:8px;font-size:11.5px;color:#6B6B7A;line-height:1.6;">
          ✅ 문장 길이 적절<br>
          ⚠️ 일부 문장이 40자를 초과합니다<br>
          💡 단락 나누기를 권장합니다
        </div>
      `
          )
        }, 1100)
      }

      function runStructure(panelId, cardId) {
        const text = document.getElementById("docBody").value
        if (!text.trim()) {
          showResult(
            panelId,
            cardId,
            "📝 먼저 내용을 작성해 주세요.",
            "warning"
          )
          return
        }
        setLoading(panelId, cardId, true)
        setTimeout(() => {
          setLoading(panelId, cardId, false)
          showResult(
            panelId,
            cardId,
            `
        <strong style="font-size:12px;">🗂 구조 분석</strong><br><br>
        <div style="font-size:12px;line-height:1.9;">
          <span style="background:#EDF3FF;color:#4C6EAF;padding:1px 7px;border-radius:4px;font-size:11px;">서론</span> 감지됨 — 배경 제시 양호<br>
          <span style="background:#F0F9F2;color:#7A9E87;padding:1px 7px;border-radius:4px;font-size:11px;">본론</span> 감지됨 — 논거 보강 권장<br>
          <span style="background:#FEF0F0;color:#C0392B;padding:1px 7px;border-radius:4px;font-size:11px;">결론</span> 미감지 — 결론부 추가 필요
        </div>
      `,
            "warning"
          )
        }, 1200)
      }

      /* ───────────────────────── Init ───────────────────────── */
      renderCards()

      // open first card by default
      setTimeout(() => {
        toggleCard("aiPanelBody", "spell")
        toggleCard("aiPanelBodyMobile", "spell")
      }, 100)
    </script>
  </body>
</html>
