<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>에쓰다 - 단일 HTML</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c0c0b; --s1: #161614; --s2: #1e1e1b; --s3: #272724;
      --border: #2d2d29; --border2: #3a3a35;
      --text: #f2ede3; --text2: #8c8679; --text3: #504e47;
      --gold: #c9a84c; --gold2: #e8c877; --gold-bg: rgba(201,168,76,0.12); --gold-bg2: rgba(201,168,76,0.06);
      --green: #74a87c; --green-bg: rgba(116,168,124,0.12);
      --blue: #6d9ecb; --blue-bg: rgba(109,158,203,0.12); --red: #c86b6b;
      --r: 14px; --r-sm: 9px; --r-xs: 6px;
      --serif: "Noto Serif KR", "Apple SD Gothic Neo", Georgia, serif;
      --sans: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg); color: var(--text); font-family: var(--sans);
      -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    }
    button, input, textarea { font: inherit; }
    textarea:focus, input:focus { outline: none; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 999px; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes scaleIn { from { opacity:0; transform:scale(.92); } to { opacity:1; transform:scale(1); } }
    @keyframes goldPulse { 0%,100%{ box-shadow:0 0 0 0 rgba(201,168,76,.4) } 50%{ box-shadow:0 0 0 8px rgba(201,168,76,0) } }
    @keyframes confettiFall { 0%{ transform:translateY(-20px) rotate(0deg); opacity:1 } 100%{ transform:translateY(110vh) rotate(360deg); opacity:0 } }
    @keyframes breathe { 0%,100%{ transform:scale(1) } 50%{ transform:scale(1.04) } }
    .fu { animation: fadeUp .45s cubic-bezier(.22,1,.36,1) both; }
    .fi { animation: fadeIn .35s ease both; }
    .si { animation: scaleIn .4s cubic-bezier(.22,1,.36,1) both; }
    .app-shell { max-width: 520px; margin: 0 auto; position: relative; height: 100vh; }
    .page { height: 100vh; overflow-y: auto; }
    .card {
      background: var(--s1); border: 1px solid var(--border); border-radius: var(--r);
      padding: 20px; transition: all .2s;
    }
    .card.hoverable { cursor: pointer; }
    .card.hoverable:hover { border-color: var(--border2); background: var(--s2); transform: translateY(-1px); }
    .badge {
      display: inline-flex; align-items: center; gap: 4px; border-radius: 999px;
      padding: 3px 10px; font-size: 11px; font-weight: 700; letter-spacing: .03em;
    }
    .badge.gold { background: var(--gold-bg); color: var(--gold); }
    .badge.green { background: var(--green-bg); color: var(--green); }
    .badge.blue { background: var(--blue-bg); color: var(--blue); }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      border-radius: 999px; font-weight: 600; font-size: 14px; padding: 12px 24px;
      transition: all .2s; cursor: pointer; letter-spacing: .01em; border: none;
      text-decoration: none;
    }
    .btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
    .btn.primary { background: var(--gold); color: #0c0c0b; }
    .btn.ghost { background: transparent; color: var(--text); border: 1px solid var(--border2); }
    .btn.soft { background: var(--s3); color: var(--text); }
    .btn.green { background: var(--green-bg); color: var(--green); }
    .btn:disabled { opacity: .4; cursor: not-allowed; filter: none !important; transform: none !important; }
    .nav-bar {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 520px;
      background: rgba(12,12,11,.94); backdrop-filter: blur(24px); border-top: 1px solid var(--border);
      display: flex; justify-content: space-around; align-items: center; padding: 10px 0 20px; z-index: 100;
    }
    .nav-btn {
      display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none;
      cursor: pointer; padding: 4px 12px; border-radius: 10px; transition: all .2s;
      color: var(--text3);
    }
    .nav-btn.active { color: var(--gold); }
    .nav-btn .icon { font-size: 18px; }
    .nav-btn.write .icon { font-size: 22px; }
    .nav-btn .label { font-size: 10px; font-weight: 600; letter-spacing: .03em; }
    .toast {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 1000;
      background: rgba(22,22,20,.96); border: 1px solid var(--border2); color: var(--text);
      padding: 10px 14px; border-radius: 999px; box-shadow: var(--shadow); font-size: 13px;
    }
    .confetti-layer {
      position: fixed; inset: 0; pointer-events: none; z-index: 999; overflow: hidden;
    }
    .confetti-piece {
      position: absolute; width: 7px; height: 7px; border-radius: 50%; top: -10px;
      animation-name: confettiFall; animation-timing-function: ease-in; animation-fill-mode: forwards;
    }
    .quote { font-family: var(--serif); font-style: italic; }
    .muted { color: var(--text2); }
    .subtle { color: var(--text3); }
    .title-serif { font-family: var(--serif); }
    .sr-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
    .growth-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 9px; }
    .hidden { display: none !important; }
    .sticky-bottom-help { position: sticky; bottom: 20px; }
    .hero-title { font-family: var(--serif); font-size: clamp(26px,5.5vw,40px); font-weight: 900; line-height: 1.45; letter-spacing: -.02em; white-space: pre-line; }
    .focus-exit {
      position: fixed; top: 14px; right: 14px; background: var(--s2); border: 1px solid var(--border);
      border-radius: 7px; padding: 5px 11px; color: var(--text3); font-size: 12px; cursor: pointer; z-index: 10;
    }
    .radar-wrap { width: 100%; display: flex; justify-content: center; }
    .timeline-row { display:flex; gap:12px; padding:11px 0; }
    .timeline-bar { height:4px; background:var(--s3); border-radius:2px; overflow:hidden; }
    .bar-fill { height:100%; border-radius:2px; }
    .markdown-like p + p { margin-top: 10px; }
    .landing-header {
      padding: 18px 24px; display:flex; align-items:center; justify-content:space-between;
      border-bottom:1px solid var(--border); position:sticky; top:0; z-index:50;
      background: rgba(12,12,11,.9); backdrop-filter: blur(20px);
    }
    .chip-list { display:flex; gap:8px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    (() => {
      const RADAR_DATA = [
        { axis: "아이디어", v: 62 },
        { axis: "논리구조", v: 41 },
        { axis: "표현력", v: 74 },
        { axis: "근거충실", v: 35 },
        { axis: "퇴고력", v: 52 },
      ];
      const STREAK_MAP = Array.from({ length: 35 }, (_, i) => ({ i, done: [0,1,2,3,5,6,7,8,10,11,12].includes(i), today: i === 12 }));
      const BADGES = [
        { icon: "🌱", name: "첫 씨앗", desc: "첫 번째 글 완성", earned: true },
        { icon: "🔥", name: "7일 연속", desc: "7일 연속 작성", earned: true },
        { icon: "✏️", name: "초고 탄생", desc: "에세이 초고 완성", earned: true },
        { icon: "🔄", name: "퇴고 입문", desc: "처음으로 퇴고", earned: false },
        { icon: "📚", name: "10편의 기록", desc: "글 10편 완성", earned: false },
        { icon: "💎", name: "한 달 수련", desc: "30일 연속 작성", earned: false },
      ];
      const DOJO = [
        { id: 1, title: "한 문단의 힘", sub: "주장 + 이유 1개", status: "done", xp: 50, lessons: 3 },
        { id: 2, title: "3단 구조", sub: "서론·본론·결론", status: "done", xp: 80, lessons: 4 },
        { id: 3, title: "근거 강화", sub: "사례와 데이터", status: "current", xp: 100, lessons: 5 },
        { id: 4, title: "반론과 재반박", sub: "다른 입장 받아들이기", status: "locked", xp: 120, lessons: 4 },
        { id: 5, title: "퇴고 마스터", sub: "삭제·재배열·보강", status: "locked", xp: 150, lessons: 6 },
      ];
      const COACH_Q = [
        "이 주제에 대해 가장 먼저 떠오르는 생각이 뭔가요?",
        "왜 그런 생각이 드셨나요? 경험이나 이유가 있다면요.",
        "반대로 생각하면 어떤 의견도 있지 않을까요?",
        "당신의 삶에서 이 주제와 연결되는 순간이 있었나요?",
        "이 글을 읽는 사람에게 꼭 전하고 싶은 한 문장은?",
      ];
      const TESTIMONIALS = [
        { q: "뭘 써야 할지 몰라서 항상 미뤘는데, 질문에 답하다 보니 어느새 한 편이 됐어요.", w: "박지수 · 중학교 2학년" },
        { q: "글쓰기를 배우고 싶었는데 어디서 시작할지 몰랐어요. 씨앗 쓰기부터 따라가니 자신감이 생겼어요.", w: "이순자 · 72세" },
        { q: "AI가 대신 써주지 않고 계속 질문을 던지는 게 처음엔 답답했는데, 그게 진짜 도움이 된다는 걸 압니다.", w: "김태현 · 대학원생" },
      ];
      const state = {
        screen: "landing",
        appPage: "home",
        confetti: false,
        confettiPieces: [],
        toast: "",
        landingTypedIndex: 0,
        landingFull: "처음 쓰는 한 문장부터,\n생각이 깊어지는 한 편의 글까지",
        onboarding: { step: 0, answer: "", level: null },
        write: { content: "", mode: "write", focusMode: false, timer: 0, showTip: false },
        feedbackTab: "structure",
        dojo: { lesson: null, step: 0, sel: null, answered: false },
        coach: { step: 0, answers: [], input: "", done: false },
      };

      const root = document.getElementById("app");
      let landingInterval = null;
      let writeTimerInterval = null;
      let toastTimer = null;

      const escapeHtml = (s) => String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
      const nl2br = (s) => escapeHtml(s).replace(/\n/g, "<br>");
      const fmt = (s) => `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;
      const sentenceCount = (content) => content.split(/[.!?。]+/).filter((s) => s.trim().length > 2).length;
      const detectLevel = (t) => t.length < 30 ? "seed" : t.length < 120 ? "grow" : "deep";
      const levelMap = {
        seed: { label: "씨앗 단계", color: "var(--green)", icon: "🌱", desc: "처음이어도 괜찮아요! 씨앗 쓰기부터 짧고 쉬운 미션으로 시작합니다." },
        grow: { label: "성장 단계", color: "var(--gold)", icon: "🌿", desc: "기초는 있군요! 에세이 구조와 논리를 단계적으로 훈련합니다." },
        deep: { label: "심화 단계", color: "var(--blue)", icon: "🌳", desc: "능숙하게 쓰시는군요. 비판적 사고와 자기 목소리 찾기를 훈련합니다." },
      };

      function showToast(message) {
        state.toast = message;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
          state.toast = "";
          render();
        }, 1800);
        render();
      }

      function startLandingTyping() {
        clearInterval(landingInterval);
        landingInterval = setInterval(() => {
          if (state.screen !== "landing") return;
          if (state.landingTypedIndex < state.landingFull.length) {
            state.landingTypedIndex += 1;
            render();
          } else {
            clearInterval(landingInterval);
          }
        }, 28);
      }

      function ensureWriteTimer() {
        clearInterval(writeTimerInterval);
        writeTimerInterval = setInterval(() => {
          if (state.screen === "app" && state.appPage === "write") {
            state.write.timer += 1;
            const timerEl = document.getElementById("write-timer");
            if (timerEl) timerEl.textContent = `⏱ ${fmt(state.write.timer)}`;
          }
        }, 1000);
      }

      function makeConfetti() {
        state.confettiPieces = Array.from({ length: 24 }, (_, i) => ({
          id: i,
          left: Math.random() * 100,
          color: ["var(--gold)", "var(--green)", "var(--blue)", "#f5a623"][Math.floor(Math.random() * 4)],
          duration: (0.9 + Math.random() * 1.2).toFixed(2),
          delay: (Math.random() * 0.6).toFixed(2),
        }));
      }

      function withActiveScreen(html) {
        const toast = state.toast ? `<div class="toast fi">${escapeHtml(state.toast)}</div>` : "";
        const confetti = state.confetti ? renderConfetti() : "";
        return `${toast}${confetti}${html}`;
      }

      function renderConfetti() {
        return `
          <div class="confetti-layer fi">
            ${state.confettiPieces.map((piece) => `
              <div class="confetti-piece" style="left:${piece.left}%;background:${piece.color};animation-duration:${piece.duration}s;animation-delay:${piece.delay}s;"></div>
            `).join("")}
            <div style="position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);text-align:center;animation:scaleIn .4s ease;">
              <div style="font-size:56px;">🎉</div>
              <div style="font-size:20px;font-weight:900;font-family:var(--serif);color:var(--gold);margin-top:10px;text-shadow:0 0 30px rgba(201,168,76,.5);">에쓰다 시작!</div>
            </div>
          </div>
        `;
      }

      function renderButton(label, action, opts = {}) {
        const cls = opts.variant || "primary";
        const attrs = [
          `class="btn ${cls}"`,
          `data-action="${action}"`,
          opts.value !== undefined ? `data-value="${escapeHtml(opts.value)}"` : "",
          opts.style ? `style="${opts.style}"` : "",
          opts.disabled ? "disabled" : "",
        ].filter(Boolean).join(" ");
        return `<button ${attrs}>${label}</button>`;
      }

      function renderBadge(label, color = "gold") {
        return `<span class="badge ${color}">${label}</span>`;
      }

      function radarChartSVG(data) {
        const cx = 160, cy = 120, radius = 76;
        const levels = 4;
        const angleStep = (Math.PI * 2) / data.length;
        const startAngle = -Math.PI / 2;
        const point = (r, angle) => ({ x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r });
        const polygonPoints = (scale) => data.map((_, i) => {
          const p = point(radius * scale, startAngle + angleStep * i);
          return `${p.x.toFixed(2)},${p.y.toFixed(2)}`;
        }).join(" ");
        const dataPoints = data.map((d, i) => {
          const p = point(radius * (d.v / 100), startAngle + angleStep * i);
          return { ...p, angle: startAngle + angleStep * i, label: d.axis, value: d.v };
        });
        const dataPolygon = dataPoints.map((p) => `${p.x.toFixed(2)},${p.y.toFixed(2)}`).join(" ");
        return `
          <svg width="320" height="240" viewBox="0 0 320 240" aria-label="스킬 레이더 차트">
            ${Array.from({ length: levels }, (_, i) => `<polygon points="${polygonPoints((i + 1) / levels)}" fill="none" stroke="#2d2d29" stroke-width="1" />`).join("")}
            ${data.map((_, i) => {
              const p = point(radius, startAngle + angleStep * i);
              return `<line x1="${cx}" y1="${cy}" x2="${p.x}" y2="${p.y}" stroke="#2d2d29" stroke-width="1" />`;
            }).join("")}
            <polygon points="${dataPolygon}" fill="rgba(201,168,76,.18)" stroke="#c9a84c" stroke-width="2" />
            ${dataPoints.map((p) => `<circle cx="${p.x}" cy="${p.y}" r="3.2" fill="#c9a84c" />`).join("")}
            ${dataPoints.map((p) => {
              const labelPos = point(radius + 22, p.angle);
              return `<text x="${labelPos.x}" y="${labelPos.y}" fill="#504e47" font-size="11" text-anchor="middle" dominant-baseline="middle">${escapeHtml(p.label)}</text>`;
            }).join("")}
          </svg>
        `;
      }

      function renderLanding() {
        const typed = state.landingFull.slice(0, state.landingTypedIndex);
        const features = [
          { icon: "🌱", title: "씨앗 쓰기", desc: "3문장으로 시작하는 첫 경험. 쓰기가 처음이어도 괜찮아요." },
          { icon: "🏋️", title: "에세이 도장", desc: "레벨별 인터랙티브 훈련으로 논리적 글쓰기를 단계적으로 쌓습니다." },
          { icon: "💬", title: "생각 코치", desc: "AI가 질문을 던집니다. 당신이 스스로 생각하고 쓰도록 이끕니다." },
          { icon: "📊", title: "성장 지도", desc: "5개 역량 레이더로 내 글쓰기 실력 변화를 데이터로 확인합니다." },
        ];
        return withActiveScreen(`
          <div class="page">
            <header class="landing-header">
              <div style="display:flex;align-items:center;gap:10px;">
                <span style="font-size:22px;font-family:var(--serif);font-weight:900;color:var(--gold);letter-spacing:-.02em;">에쓰다</span>
                ${renderBadge("Beta")}
              </div>
              <div class="chip-list">
                ${renderButton("로그인", "start-app", { variant: "ghost", style: "padding:8px 16px;font-size:13px;" })}
                ${renderButton("시작하기", "start-app", { style: "padding:8px 16px;font-size:13px;" })}
              </div>
            </header>
            <section style="padding:72px 24px 56px;max-width:500px;margin:0 auto;width:100%;text-align:center;">
              <div class="fu" style="margin-bottom:14px;">${renderBadge("✦ AI 자기주도 에세이 교육 플랫폼", "green")}</div>
              <h1 class="hero-title fu">${nl2br(typed)}<span style="opacity:${typed.length < state.landingFull.length ? 1 : 0};">|</span></h1>
              <p class="fu muted" style="font-size:15px;line-height:1.9;margin:22px auto 36px;max-width:380px;">
                AI가 대신 써주는 도구가 아닙니다.<br>
                <strong style="color:var(--text);">AI가 질문을 던져 당신이 스스로 쓰게 하는</strong> 코치형 글쓰기 훈련장입니다.
              </p>
              <div class="fu" style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
                ${renderButton("무료로 시작하기 →", "start-app", { style: "font-size:16px;padding:15px 36px;animation:goldPulse 2.5s infinite;" })}
                ${renderButton("둘러보기", "start-app", { variant: "ghost", style: "font-size:14px;padding:14px 26px;" })}
              </div>
              <p class="fu subtle" style="margin-top:16px;font-size:12px;">회원가입 없이 첫 글감 체험 가능 · 무료 플랜 제공</p>
            </section>
            <section style="padding:20px 18px 56px;max-width:520px;margin:0 auto;width:100%;">
              <div class="sr-grid-2">
                ${features.map((f) => `
                  <div class="card hoverable fu" data-action="start-app" style="padding:20px;position:relative;overflow:hidden;">
                    <div style="font-size:30px;margin-bottom:10px;">${f.icon}</div>
                    <div style="font-size:14px;font-weight:700;margin-bottom:7px;font-family:var(--serif);">${escapeHtml(f.title)}</div>
                    <div class="muted" style="font-size:12px;line-height:1.75;">${escapeHtml(f.desc)}</div>
                    <div style="position:absolute;top:-16px;right:-16px;font-size:72px;opacity:.04;">${f.icon}</div>
                  </div>
                `).join("")}
              </div>
            </section>
            <section style="padding:0 18px 56px;max-width:520px;margin:0 auto;width:100%;">
              <div class="card fu">
                <div class="subtle" style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;">에쓰다는 이것이 아닙니다</div>
                ${[
                  ["📖 책·강의", "지식 전달은 책이 합니다. 에쓰다는 생각을 글로 밀어내는 훈련을 합니다."],
                  ["🗒 노션·옵시디언", "정보 수집은 생산성 앱이 합니다. 에쓰다는 생각을 글로 발전시킵니다."],

            </div>
            <div class="card fu" style="margin-bottom:14px;padding:16px;">
              <div style="font-size:13px;font-weight:700;margin-bottom:3px;">획득한 뱃지</div>
              <div class="subtle" style="font-size:11px;margin-bottom:14px;">${BADGES.filter((b) => b.earned).length} / ${BADGES.length}개 달성</div>
              <div class="growth-grid">
                ${BADGES.map((b) => `
                  <div style="text-align:center;padding:13px 7px;background:${b.earned ? 'var(--s2)' : 'var(--s1)'};border-radius:var(--r-sm);border:1px solid ${b.earned ? 'var(--border2)' : 'var(--border)'};opacity:${b.earned ? 1 : .38};transition:all .2s;">
                    <div style="font-size:26px;margin-bottom:5px;filter:${b.earned ? 'none' : 'grayscale(100%)'};">${b.icon}</div>
                    <div style="font-size:11px;font-weight:700;margin-bottom:2px;color:${b.earned ? 'var(--text)' : 'var(--text3)'};">${b.name}</div>
                    <div class="subtle" style="font-size:10px;line-height:1.4;">${b.desc}</div>
                  </div>
                `).join("")}
              </div>
            </div>
            <div class="card fu" style="padding:16px;">
              <div style="font-size:13px;font-weight:700;margin-bottom:12px;">성장 타임라인</div>
              ${[
                { date: '03.12', title: '기술과 게으름', score: 74, diff: '+12' },
                { date: '03.10', title: '봄날의 기억', score: 62, diff: '+7' },
                { date: '03.07', title: '첫 에세이', score: 55, diff: '+55' },
              ].map((h, i) => `
                <div class="timeline-row" style="${i < 2 ? 'border-bottom:1px solid var(--border);' : ''}">
                  <div class="subtle" style="font-size:11px;min-width:36px;padding-top:2px;">${h.date}</div>
                  <div style="flex:1;">
                    <div style="font-size:13px;font-weight:600;margin-bottom:5px;">${h.title}</div>
                    <div class="timeline-bar"><div class="bar-fill" style="width:${h.score}%;background:linear-gradient(90deg,var(--green),var(--gold));"></div></div>
                  </div>
                  <div style="font-size:13px;font-weight:800;color:var(--green);min-width:36px;text-align:right;">${h.diff}</div>
                </div>
              `).join("")}
            </div>
          </div>
        `;
      }

      function renderAppShell() {
        const page = (() => {
          switch (state.appPage) {
            case 'home': return renderHomePage();
            case 'write': return renderWritePage();
            case 'dojo': return renderDojoPage();
            case 'coach': return renderCoachPage();
            case 'growth': return renderGrowthPage();
            default: return renderHomePage();
          }
        })();
        return withActiveScreen(`
          <div class="app-shell">
            ${page}
            <div class="nav-bar">
              ${[
                { id: 'home', icon: '⌂', label: '홈' },
                { id: 'dojo', icon: '🏋', label: '도장' },
                { id: 'write', icon: '✍', label: '쓰기' },
                { id: 'coach', icon: '💬', label: '코치' },
                { id: 'growth', icon: '📊', label: '성장' },
              ].map((it) => `
                <button class="nav-btn ${state.appPage === it.id ? 'active' : ''} ${it.id === 'write' ? 'write' : ''}" data-action="nav" data-value="${it.id}">
                  <span class="icon">${it.icon}</span>
                  <span class="label">${it.label}</span>
                </button>
              `).join("")}
            </div>
          </div>
        `);
      }

      function render(options = {}) {
        const active = document.activeElement;
        const preserve = options.preserveFocus && active && (active.tagName === 'TEXTAREA' || active.tagName === 'INPUT');
        const activeId = preserve ? active.id : null;
        const selStart = preserve && typeof active.selectionStart === 'number' ? active.selectionStart : null;
        const selEnd = preserve && typeof active.selectionEnd === 'number' ? active.selectionEnd : null;

        const html = state.screen === 'landing'
          ? renderLanding()
          : state.screen === 'onboarding'
            ? renderOnboarding()
            : renderAppShell();

        root.innerHTML = html;
        bindInputs();
        if (state.appPage === 'coach') {
          const anchor = document.getElementById('coach-bottom-anchor');
          if (anchor) anchor.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }
        if (preserve && activeId) {
          const restored = document.getElementById(activeId);
          if (restored) {
            restored.focus();
            if (selStart !== null && selEnd !== null && typeof restored.setSelectionRange === 'function') {
              restored.setSelectionRange(selStart, selEnd);
            }
          }
        }
      }

      function bindInputs() {
        const onboarding = document.getElementById('onboarding-answer');
        if (onboarding) {
          onboarding.addEventListener('input', (e) => {
            state.onboarding.answer = e.target.value;
            render({ preserveFocus: true });
          });
        }
        const write = document.getElementById('write-content');
        if (write) {
          write.addEventListener('input', (e) => {
            state.write.content = e.target.value;
            render({ preserveFocus: true });
          });
        }
        const coachInput = document.getElementById('coach-input');
        if (coachInput) {
          coachInput.addEventListener('input', (e) => {
            state.coach.input = e.target.value;
            render({ preserveFocus: true });
          });
          coachInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
              e.preventDefault();
              handleAction('coach-send');
            }
          });
        }
      }

      function finishOnboarding() {
        state.screen = 'app';
        state.appPage = 'home';
        state.confetti = true;
        makeConfetti();
        render();
        setTimeout(() => {
          state.confetti = false;
          render();
        }, 3000);
      }

      function handleAction(action, value) {
        switch (action) {
          case 'start-app':
            state.screen = 'onboarding';
            render();
            return;
          case 'onboarding-step':
            state.onboarding.step = Number(value);
            render();
            return;
          case 'onboarding-seed':
            state.onboarding.level = 'seed';
            state.onboarding.step = 2;
            render();
            return;
          case 'onboarding-submit':
            state.onboarding.level = detectLevel(state.onboarding.answer);
            state.onboarding.step = 2;
            render();
            return;
          case 'finish-onboarding':
            finishOnboarding();
            return;
          case 'nav':
            state.appPage = value;
            render();
            return;
          case 'write-toggle-focus':
            state.write.focusMode = !state.write.focusMode;
            render();
            return;
          case 'write-show-tip':
            state.write.showTip = true;
            render();
            return;
          case 'write-hide-tip':
            state.write.showTip = false;
            render();
            return;
          case 'write-feedback':
            state.write.mode = 'feedback';
            state.feedbackTab = 'structure';
            render();
            return;
          case 'write-save':
            showToast('초안이 저장되었습니다.');
            return;
          case 'feedback-back':
            state.write.mode = 'write';
            render();
            return;
          case 'feedback-tab':
            state.feedbackTab = value;
            render();
            return;
          case 'feedback-hint':
            showToast('힌트 기능은 데모에서는 안내만 제공합니다.');
            return;
          case 'dojo-open':
            state.dojo.lesson = Number(value);
            state.dojo.step = 0;
            state.dojo.sel = null;
            state.dojo.answered = false;
            render();
            return;
          case 'dojo-back':
            state.dojo.lesson = null;
            state.dojo.step = 0;
            state.dojo.sel = null;
            state.dojo.answered = false;
            render();
            return;
          case 'dojo-step':
            state.dojo.step = Number(value);
            if (state.dojo.step !== 1) {
              state.dojo.sel = null;
              state.dojo.answered = false;
            }
            render();
            return;
          case 'dojo-select':
            state.dojo.sel = value;
            render();
            return;
          case 'dojo-confirm':
            state.dojo.answered = true;
            render();
            return;
          case 'dojo-complete':
            state.dojo.lesson = null;
            state.dojo.step = 0;
            state.dojo.sel = null;
            state.dojo.answered = false;
            showToast('레슨을 완료했습니다. +100 XP');
            render();
            return;
          case 'coach-send':
            if (!state.coach.input.trim()) return;
            state.coach.answers.push(state.coach.input.trim());
            state.coach.input = '';
            if (state.coach.step + 1 >= COACH_Q.length) {
              state.coach.done = true;
            } else {
              state.coach.step += 1;
            }
            render();
            return;
          default:
            return;
        }
      }

      document.addEventListener('click', (e) => {
        const target = e.target.closest('[data-action]');
        if (!target) return;
        const action = target.getAttribute('data-action');
        const value = target.getAttribute('data-value');
        handleAction(action, value);
      });

      startLandingTyping();
      ensureWriteTimer();
      render();
    })();
  </script>
</body>
</html>
